<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>100天造物计划 · 粘豆包</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       造物计划 · 整图全宽作背景 + 5 个热点（位置对照 image11）+ 进度卡向上叠
       ============================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #5B7BF5;
      --primary-deep: #4456D4;
      --purple: #B79DFF;
      --pink: #FF8FA3;
      --yellow: #FFD66B;
      --bun: #FFF6E8;
      --cheek: #FFB6C1;
      --bg-top: #EAF1FF;
      --bg-mid: #F2EAFF;
      --bg-bottom: #FFE5F0;
      --text: #2D2B5F;
      --text-soft: #6B6B95;
      --text-mute: #9CA0BD;
      --card: #ffffff;
      --border: rgba(91, 123, 245, 0.12);
      --shadow-sm: 0 4px 12px rgba(91, 123, 245, 0.08);
      --shadow-md: 0 12px 32px rgba(91, 123, 245, 0.12);
      --shadow-lg: 0 20px 50px rgba(91, 123, 245, 0.18);
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      padding: 24px 0 60px;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .display { font-family: 'ZCOOL KuaiLe', 'ZCOOL XiaoWei', cursive; letter-spacing: 0.02em; }

    /* ============================================
       海报（全宽 + 5 个热点 + 文字）
       ============================================ */
    .poster {
      position: relative;
      width: 100%;
      margin: 0;
      border-radius: 0;
      overflow: hidden;
      background: white;
      box-shadow: 0 16px 40px rgba(91, 123, 245, 0.12);
    }
    .poster img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 热点 — 居中文字 */
    .hot {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 2px solid transparent;
      transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s, color 0.18s;
      cursor: pointer;
      text-align: center;
    }
    .hot:focus-visible { outline: none; }

    /* 返回主页图标（左上角） */
    .back-home {
      position: absolute;
      top: 2.5%;
      left: 1.5%;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px 6px 11px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(91, 123, 245, 0.18);
      color: #2D2B5F;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.9rem;
      text-decoration: none;
      z-index: 20;
      transition: all 0.2s;
    }
    .back-home:hover {
      background: white;
      transform: translateX(-2px);
      box-shadow: 0 6px 18px rgba(91, 123, 245, 0.28);
      color: var(--primary);
    }
    .back-home svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 顶部 nav 文字按钮（造物库 / 关于计划）— 无底色深字 */
    .hot-nav-text {
      background: transparent;
      color: #2D2B5F;
      border-radius: 12px;
    }
    .hot-nav-text .hot-label {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .hot-nav-text:hover {
      color: var(--primary);
      background: rgba(91, 123, 245, 0.08);
    }
    .hot-nav-text:active {
      background: rgba(91, 123, 245, 0.15);
    }

    /* 顶部 nav 提交需求 — 实色按钮（对照 image11 的蓝色 pill） */
    .hot-nav-submit {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
      color: white;
      box-shadow: 0 4px 14px rgba(91, 123, 245, 0.35);
    }
    .hot-nav-submit .hot-label {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .hot-nav-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(91, 123, 245, 0.50);
    }
    .hot-nav-submit:active {
      transform: translateY(0);
    }

    /* CTA 进入造物库 — 大蓝按钮 */
    .hot-cta-1 {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(91, 123, 245, 0.35);
    }
    .hot-cta-1 .hot-label {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .hot-cta-1:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(91, 123, 245, 0.50);
    }
    .hot-cta-1:active {
      transform: translateY(-1px);
    }

    /* CTA 提交需求 — 白底深字（对照 image11 的白色 pill） */
    .hot-cta-2 {
      background: white;
      color: #2D2B5F;
      border: 1px solid rgba(91, 123, 245, 0.18);
      box-shadow: 0 6px 16px rgba(91, 123, 245, 0.18);
    }
    .hot-cta-2 .hot-label {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .hot-cta-2:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(91, 123, 245, 0.30);
      border-color: rgba(91, 123, 245, 0.35);
    }
    .hot-cta-2:active {
      transform: translateY(-1px);
    }

    /* 顶部 nav 位置 — 三个文字齐平（top 4%, height 7%） */
    .hot-nav-1 { top:  4.0%; left: 65.0%; width:  9.0%; height: 7.0%; }  /* 造物库 */
    .hot-nav-2 { top:  4.0%; left: 74.0%; width:  9.0%; height: 7.0%; }  /* 关于计划 */
    .hot-nav-3 { top:  4.0%; left: 84.0%; width: 13.0%; height: 7.0%; }  /* 提交需求 (蓝) — 跟其他两个齐平 */

    /* 中部 CTA 位置 — 继续下移 */
    .hot-cta-1 { top: 70.0%; left:  5.0%; width: 19.0%; height: 6.0%; }  /* 进入造物库 (蓝) */
    .hot-cta-2 { top: 70.0%; left: 26.0%; width: 17.0%; height: 6.0%; }  /* 提交需求 (白) */

    /* ============================================
       进度卡（向上叠到图片底部空白处）
       ============================================ */
    .progress-section {
      position: relative;
      max-width: 1100px;
      margin: -200px auto 0;
      padding: 0 16px;
      z-index: 10;
    }
    .progress-card {
      background: var(--card);
      border-radius: 28px;
      padding: 40px 44px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .progress-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--purple) 50%, var(--pink) 100%);
    }
    .progress-card::after {
      content: '✦'; position: absolute; top: 18px; right: 28px;
      color: var(--yellow); font-size: 20px;
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 24px; margin-bottom: 36px;
    }
    .progress-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.5rem; color: var(--text);
      margin-bottom: 4px;
    }
    .progress-sub {
      color: var(--text-soft); font-size: 0.9rem;
      display: flex; align-items: center; gap: 6px;
    }
    .pulse-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #4ADE80;
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
      100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
    }

    .progress-stats {
      display: flex;
      align-items: baseline;
      gap: 28px;
    }
    .stat-submitted {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stat-submitted .stat-num {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 2.4rem;
      background: linear-gradient(135deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .stat-submitted .stat-label {
      font-size: 0.85rem;
      color: var(--text-soft);
      font-weight: 500;
    }

    .progress-num {
      font-family: 'ZCOOL KuaiLe', cursive;
      display: flex; align-items: baseline; gap: 2px;
      line-height: 1;
    }
    .num-current {
      font-size: 3.4rem;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: gentle-bounce 2.5s ease-in-out infinite;
    }
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .num-divider { font-size: 2.2rem; color: var(--text-mute); margin: 0 2px; }
    .num-total { font-size: 2.2rem; color: var(--text-mute); }
    .num-label { font-size: 1rem; color: var(--text-mute); margin-left: 4px;
      font-family: 'Noto Sans SC', sans-serif; }

    /* 时间线 */
    .timeline {
      position: relative; display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px; padding: 0 4px;
    }
    .timeline-track {
      position: absolute; top: 38px; left: 6%; right: 6%;
      height: 3px; z-index: 0;
      background: linear-gradient(90deg,
        var(--primary) 0%, var(--primary) 8%,
        rgba(156, 160, 189, 0.25) 8%, rgba(156, 160, 189, 0.25) 100%);
      border-radius: 2px;
    }

    .day-node {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 8px 4px 12px;
      border-radius: 16px;
      cursor: pointer; transition: all 0.25s;
    }
    .day-node:hover { background: var(--bg-top); transform: translateY(-2px); }

    .day-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5),
                  0 0 0 4px white,
                  0 0 0 6px #8AA0FF;
      animation: bob 3s ease-in-out infinite;
    }
    .day-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-6px) rotate(1deg); }
    }

    .day-locked .day-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: white;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--text-mute);
      transition: all 0.25s;
    }
    .day-locked:hover .day-icon {
      border-color: var(--primary);
      color: var(--primary);
      transform: scale(1.05) rotate(-5deg);
    }

    .day-label {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.95rem; color: var(--text);
    }
    .day-locked .day-label { color: var(--text-soft); }
    .day-sub {
      font-size: 0.7rem; color: var(--primary);
      background: var(--bg-top);
      padding: 2px 10px; border-radius: 50px;
      font-weight: 500;
    }
    .day-locked .day-sub { display: none; }

    /* ============================================
       响应式
       ============================================ */
    @media (max-width: 768px) {
      body { padding: 12px 0 40px; }
      .progress-section { margin: -100px auto 0; }
      .progress-card { padding: 28px 22px; border-radius: 22px; }
      .progress-head { flex-direction: column; align-items: flex-start; gap: 16px; }
      .progress-stats { width: 100%; justify-content: space-between; gap: 16px; }
      .stat-submitted .stat-num { font-size: 1.8rem; }
      .num-current { font-size: 2.6rem; }
      .num-total, .num-divider { font-size: 1.6rem; }
      .timeline { gap: 4px; }
      .day-avatar, .day-locked .day-icon { width: 48px; height: 48px; }
      .day-label { font-size: 0.8rem; }

      .back-home { padding: 4px 10px 4px 8px; font-size: 0.75rem; }
      .back-home svg { width: 14px; height: 14px; }

      .hot-nav-1 { left: 56.0%; width: 12.0%; }
      .hot-nav-2 { left: 68.0%; width: 12.0%; }
      .hot-nav-3 { left: 80.0%; width: 16.0%; }
      .hot-nav-text .hot-label, .hot-nav-submit .hot-label { font-size: 0.85rem; }
      .hot-cta-1 { top: 72.0%; height: 6.0%; }
      .hot-cta-2 { top: 72.0%; height: 6.0%; }
      .hot-cta-1 .hot-label, .hot-cta-2 .hot-label { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- 海报：image12 全宽作背景 + 5 个热点（位置对照 image11） -->
  <div class="poster">
    <img src="/assets/creationplan-hero2.png?v=2" alt="100天造物计划">

    <!-- 左上角：返回主页 -->
    <a href="/" class="back-home" aria-label="返回主页">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>返回</span>
    </a>

    <a class="hot hot-nav-text hot-nav-1" href="javascript:void(0)" aria-label="造物库">
      <span class="hot-label">造物库</span>
    </a>
    <a class="hot hot-nav-text hot-nav-2" href="javascript:void(0)" aria-label="关于计划">
      <span class="hot-label">关于计划</span>
    </a>
    <a class="hot hot-nav-submit hot-nav-3" href="https://wcn80tpe0889.feishu.cn/share/base/form/shrcnUuxHWRV42AloeP03aulLHh" target="_blank" rel="noopener noreferrer" aria-label="提交需求">
      <span class="hot-label">提交需求</span>
    </a>

    <a class="hot hot-cta-1" href="javascript:void(0)" aria-label="进入造物库">
      <span class="hot-label">进入造物库</span>
    </a>
    <a class="hot hot-cta-2" href="https://wcn80tpe0889.feishu.cn/share/base/form/shrcnUuxHWRV42AloeP03aulLHh" target="_blank" rel="noopener noreferrer" aria-label="提交需求">
      <span class="hot-label">提交需求</span>
    </a>
  </div>

  <!-- 进度卡：向上叠到图片底部 -->
  <section class="progress-section">
    <div class="progress-card">

      <div class="progress-head">
        <div>
          <h2 class="progress-title">100天造物计划进度</h2>
          <p class="progress-sub">
            <span class="pulse-dot"></span>
            计划已启动 · 第一个工具正在路上！
          </p>
        </div>
        <div class="progress-stats">
          <div class="stat-submitted">
            <span class="stat-num">0</span>
            <span class="stat-label">人已提交需求</span>
          </div>
          <div class="progress-num">
            <span class="num-current">0</span><span class="num-divider">/</span><span class="num-total">100</span><span class="num-label">天</span>
          </div>
        </div>
      </div>

      <div class="timeline">
        <div class="timeline-track"></div>

        <a class="day-node day-active" href="javascript:void(0)">
          <div class="day-avatar">
            <img src="/assets/icon.png?v=1" alt="造物者">
          </div>
          <div class="day-label">Day 1</div>
          <div class="day-sub">启动 ✓</div>
        </a>

        <a class="day-node day-locked" href="javascript:void(0)">
          <div class="day-icon">🔒</div>
          <div class="day-label">Day 20</div>
        </a>
        <a class="day-node day-locked" href="javascript:void(0)">
          <div class="day-icon">🔒</div>
          <div class="day-label">Day 40</div>
        </a>
        <a class="day-node day-locked" href="javascript:void(0)">
          <div class="day-icon">🔒</div>
          <div class="day-label">Day 60</div>
        </a>
        <a class="day-node day-locked" href="javascript:void(0)">
          <div class="day-icon">🔒</div>
          <div class="day-label">Day 80</div>
        </a>
        <a class="day-node day-locked" href="javascript:void(0)">
          <div class="day-icon">🔒</div>
          <div class="day-label">Day 100</div>
        </a>
      </div>
    </div>
  </section>

</body>
</html>
