<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>造物库 · 粘豆包</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       造物库 · 星空背景 + 大搜索框 + 项目卡片网格
       ============================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-1: #0a0e27;
      --deep-2: #1a1240;
      --deep-3: #2d1b4e;
      --gold: #FFD66B;
      --pink: #FF8FA3;
      --purple: #B79DFF;
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.7);
      --text-mute: rgba(255, 255, 255, 0.45);
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-hover: rgba(255, 255, 255, 0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--deep-1);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    a { color: inherit; text-decoration: none; }
    .display { font-family: 'ZCOOL KuaiLe', cursive; letter-spacing: 0.04em; }

    /* ============================================
       星空背景：3 层视差（星云 + 大星 + 小星 + 流星）
       ============================================ */
    .starfield {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(183, 157, 255, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 143, 163, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(91, 123, 245, 0.15) 0%, transparent 60%),
        linear-gradient(180deg, var(--deep-1) 0%, var(--deep-2) 60%, var(--deep-3) 100%);
      overflow: hidden;
    }

    /* 100+ 颗小星：box-shadow trick, 1 个元素渲染 N 颗 */
    .stars {
      position: absolute;
      top: 0; left: 0;
      width: 1px; height: 1px;
      background: transparent;
    }
    .stars-s, .stars-m, .stars-l {
      animation: twinkle 4s ease-in-out infinite;
    }
    .stars-s { box-shadow:
      23px 47px #fff, 89px 123px #fff, 156px 89px #fff, 234px 167px #fff,
      312px 234px #fff, 389px 56px #fff, 456px 312px #fff, 534px 178px #fff,
      612px 267px #fff, 689px 89px #fff, 767px 345px #fff, 845px 123px #fff,
      923px 234px #fff, 1001px 167px #fff, 1078px 289px #fff, 1156px 78px #fff,
      1234px 312px #fff, 1312px 156px #fff, 1389px 234px #fff, 1467px 67px #fff,
      1545px 289px #fff, 1623px 178px #fff, 1700px 312px #fff, 1778px 89px #fff,
      1856px 234px #fff, 1934px 156px #fff, 2011px 267px #fff, 2089px 78px #fff,
      45px 423px #fff, 134px 489px #fff, 256px 534px #fff, 367px 478px #fff,
      478px 556px #fff, 589px 423px #fff, 700px 512px #fff, 812px 467px #fff,
      923px 545px #fff, 1034px 489px #fff, 1145px 567px #fff, 1256px 423px #fff,
      1367px 534px #fff, 1478px 478px #fff, 1589px 556px #fff, 1700px 423px #fff,
      1811px 512px #fff, 1922px 467px #fff, 2033px 545px #fff, 2144px 489px #fff,
      78px 678px #fff, 189px 734px #fff, 300px 712px #fff, 411px 789px #fff,
      523px 656px #fff, 634px 745px #fff, 745px 678px #fff, 856px 756px #fff,
      967px 712px #fff, 1078px 789px #fff, 1189px 656px #fff, 1300px 745px #fff,
      1411px 678px #fff, 1522px 756px #fff, 1633px 712px #fff, 1744px 789px #fff,
      134px 856px #fff, 245px 923px #fff, 356px 889px #fff, 467px 956px #fff,
      578px 845px #fff, 689px 923px #fff, 800px 889px #fff, 911px 956px #fff;
    }
    .stars-m { width: 2px; height: 2px; box-shadow:
      100px 200px rgba(255, 214, 107, 0.9),
      345px 78px rgba(255, 214, 107, 0.9),
      567px 289px rgba(255, 214, 107, 0.9),
      789px 156px rgba(255, 214, 107, 0.9),
      1011px 234px rgba(255, 214, 107, 0.9),
      1233px 89px rgba(255, 214, 107, 0.9),
      1455px 312px rgba(255, 214, 107, 0.9),
      178px 478px rgba(255, 214, 107, 0.9),
      400px 556px rgba(255, 214, 107, 0.9),
      622px 423px rgba(255, 214, 107, 0.9),
      844px 534px rgba(255, 214, 107, 0.9),
      1066px 478px rgba(255, 214, 107, 0.9),
      1288px 567px rgba(255, 214, 107, 0.9),
      289px 712px rgba(255, 214, 107, 0.9),
      511px 789px rgba(255, 214, 107, 0.9),
      733px 678px rgba(255, 214, 107, 0.9),
      955px 756px rgba(255, 214, 107, 0.9),
      1177px 712px rgba(255, 214, 107, 0.9);
      animation-delay: -2s;
    }
    .stars-l { width: 2.5px; height: 2.5px; box-shadow:
      234px 167px #fff,
      689px 423px #fff,
      1145px 267px #fff,
      1611px 534px #fff,
      378px 789px #fff,
      834px 656px #fff;
      animation-delay: -3s;
      animation-duration: 5s;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 1; }
    }

    /* 流星：1 个元素 8 秒划过一次 */
    .shooting-star {
      position: absolute;
      top: 15%;
      left: -10%;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      border-radius: 999px;
      filter: drop-shadow(0 0 4px #fff);
      transform: rotate(15deg);
      animation: shoot 8s linear infinite;
      animation-delay: 2s;
      opacity: 0;
    }
    .shooting-star::before {
      content: '';
      position: absolute;
      right: 0; top: -1px;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8);
    }
    .shooting-star.s2 {
      top: 45%;
      animation-delay: 6s;
      animation-duration: 10s;
    }
    @keyframes shoot {
      0%   { transform: translateX(0) translateY(0) rotate(15deg); opacity: 0; }
      5%   { opacity: 1; }
      20%  { transform: translateX(120vw) translateY(30vh) rotate(15deg); opacity: 0; }
      100% { transform: translateX(120vw) translateY(30vh) rotate(15deg); opacity: 0; }
    }

    /* ============================================
       顶部导航
       ============================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(10, 14, 39, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .back-home {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 6px 11px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: var(--text);
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .back-home:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-2px);
      color: var(--gold);
    }
    .back-home svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .topbar-title {
      flex: 1;
      text-align: center;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
    }
    .topbar-title .accent {
      background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar-placeholder {
      width: 70px;
    }

    /* ============================================
       头部区
       ============================================ */
    .hero {
      max-width: 800px;
      margin: 60px auto 28px;
      padding: 0 24px;
      text-align: center;
    }
    .hero-tag {
      display: inline-block;
      padding: 4px 14px;
      background: rgba(255, 214, 107, 0.12);
      border: 1px solid rgba(255, 214, 107, 0.3);
      color: var(--gold);
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.82rem;
      border-radius: 999px;
      margin-bottom: 18px;
      letter-spacing: 0.1em;
    }
    .hero-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 2.6rem;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.2;
      text-shadow: 0 0 30px rgba(255, 214, 107, 0.3);
    }
    .hero-title .gold { color: var(--gold); }
    .hero-sub {
      color: var(--text-soft);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    .hero-sub .sparkle {
      color: var(--gold);
      display: inline-block;
      animation: sparkle 2s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.3); }
    }

    /* ============================================
       搜索框
       ============================================ */
    .search-wrap {
      max-width: 600px;
      margin: 0 auto 50px;
      padding: 0 24px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.3s;
    }
    .search-box:focus-within {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 214, 107, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  0 0 0 4px rgba(255, 214, 107, 0.15),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .search-box svg {
      width: 20px; height: 20px;
      stroke: var(--text-soft); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .search-box:focus-within svg { stroke: var(--gold); }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
    }
    .search-box input::placeholder {
      color: var(--text-mute);
    }
    .search-box .search-shortcut {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: var(--text-mute);
      font-family: -apple-system, BlinkMacSystemFont, monospace;
      font-size: 0.7rem;
    }

    /* ============================================
       排序栏（搜索框和卡片之间）
       ============================================ */
    .sort-wrap {
      max-width: 1000px;
      margin: 0 auto 24px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sort-label {
      color: var(--text-mute);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      margin-right: 4px;
    }
    .sort-btn {
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      color: var(--text-soft);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sort-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-color: rgba(255, 214, 107, 0.3);
    }
    .sort-btn.active {
      background: rgba(255, 214, 107, 0.14);
      border-color: rgba(255, 214, 107, 0.55);
      color: var(--gold);
    }
    .sort-hint {
      margin-left: auto;
      color: var(--text-mute);
      font-size: 0.75rem;
    }

    /* ============================================
       项目卡片网格
       ============================================ */
    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .repo-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 22px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text);
      transition: all 0.25s;
      overflow: hidden;
    }
    .repo-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 214, 107, 0.4), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .repo-card:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 214, 107, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(91, 123, 245, 0.2);
    }
    .repo-card:hover::before { opacity: 1; }
    .repo-card.is-placeholder {
      opacity: 0.55;
      border-style: dashed;
    }
    .repo-card.is-placeholder:hover {
      opacity: 0.85;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-icon {
      font-size: 1.6rem;
      line-height: 1;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.1rem;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }
    .card-arrow {
      color: var(--text-mute);
      font-size: 1.1rem;
      transition: all 0.25s;
      margin-left: auto;
    }
    .repo-card:hover .card-arrow {
      color: var(--gold);
      transform: translateX(2px);
    }
    .card-desc {
      color: var(--text-soft);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
      color: var(--text-mute);
      font-size: 0.75rem;
    }
    .card-meta .tag {
      padding: 2px 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
    }
    .card-meta .tag.live { color: #4ADE80; background: rgba(74, 222, 128, 0.1); }
    .card-meta .tag.draft { color: var(--gold); background: rgba(255, 214, 107, 0.1); }
    .card-meta .tag.pending { color: #60A5FA; background: rgba(96, 165, 250, 0.12); }
    .card-usage {
      margin-left: auto;
      color: var(--text-mute);
      font-family: -apple-system, BlinkMacSystemFont, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .card-usage strong {
      color: var(--text-soft);
      font-weight: 600;
      margin-right: 2px;
    }

    /* ============================================
       底部
       ============================================ */
    .footer-note {
      max-width: 600px;
      margin: 48px auto 0;
      padding: 0 24px;
      text-align: center;
      color: var(--text-mute);
      font-size: 0.85rem;
    }
    .footer-note .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 8px;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1; transform: scale(1.1); }
    }

    /* ============================================
       响应式
       ============================================ */
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .sort-hint { display: none; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 10px 14px; }
      .topbar-title { font-size: 1rem; }
      .back-home { padding: 4px 10px 4px 8px; font-size: 0.78rem; }
      .back-home svg { width: 14px; height: 14px; }
      .topbar-placeholder { width: 50px; }

      .hero { margin: 36px auto 20px; padding: 0 16px; }
      .hero-title { font-size: 2rem; }
      .hero-sub { font-size: 0.9rem; }

      .search-wrap { margin-bottom: 16px; padding: 0 14px; }
      .search-box { padding: 12px 18px; }
      .search-box input { font-size: 0.95rem; }
      .search-box .search-shortcut { display: none; }

      .sort-wrap { margin-bottom: 16px; padding: 0 14px; }
      .sort-btn { padding: 6px 12px; font-size: 0.78rem; }

      .grid { grid-template-columns: 1fr; gap: 14px; padding: 0 14px; }
      .repo-card { padding: 18px 16px; }
    }
  </style>
</head>
<body>

  <!-- 星空背景 -->
  <div class="starfield" aria-hidden="true">
    <div class="stars stars-s"></div>
    <div class="stars stars-m"></div>
    <div class="stars stars-l"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star s2"></div>
  </div>

  <!-- 顶部导航 -->
  <nav class="topbar">
    <a href="/creationplan/" class="back-home" aria-label="返回造物计划">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>返回</span>
    </a>
    <h1 class="topbar-title">造物 <span class="accent">库</span></h1>
    <div class="topbar-placeholder"></div>
  </nav>

  <!-- 头部 -->
  <section class="hero">
    <span class="hero-tag">✦ REPOSITORIES ✦</span>
    <h2 class="hero-title">永不臣服于失控的世界<br><span class="gold">自由地追逐繁星</span></h2>
  </section>

  <!-- 搜索框 -->
  <div class="search-wrap">
    <label class="search-box" for="searchInput">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="搜索造物..." autocomplete="off" spellcheck="false">
      <span class="search-shortcut">⌘ K</span>
    </label>
  </div>

  <!-- 排序栏 -->
  <div class="sort-wrap">
    <span class="sort-label">排序</span>
    <button class="sort-btn active" data-sort="plan" type="button">按计划</button>
    <button class="sort-btn" data-sort="latest" type="button">按最新</button>
    <button class="sort-btn" data-sort="hot" type="button">按热度</button>
    <span class="sort-hint" id="sortHint">Day 1 → Day 100</span>
  </div>

  <!-- 项目网格（JS 生成 100 个卡片） -->
  <main class="grid" id="grid"></main>

  <!-- 底部 -->
  <p class="footer-note">
    共 100 个造物坑位<span class="dot"></span>当前 <span id="builtCount">0</span> 个已建
  </p>

  <script>
    // ============================================
    // 100 天造物库 · 卡片生成 + 排序 + 搜索 + 访问统计
    // ============================================

    // 真实项目配置（其他 97 天都是占位）
    const REAL_PROJECTS = {
      1: {
        title: '世界杯赛程推荐',
        desc: '输入偏好（不熬夜/对攻/焦点战...）让 AI 帮你筛 2026 赛程',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/worldcup2026/'
      },
      2: {
        title: '摸鱼神器',
        desc: '飞书文档 · 上班/学习时偷偷放松一下的小工具',
        status: 'live', // ● 已建
        href: '/creationplan/api/go?day=2&u=' + encodeURIComponent('https://wcn80tpe0889.feishu.cn/wiki/Z3KFwDGegiqB0Lk7hpycpzscnng')
      },
      3: {
        title: '标点整理台',
        desc: '文字标点整理、文字空格空行处理',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/wordgood/'
      },
      4: {
        title: '你最能赚钱啦',
        desc: '小钱钱计时器',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/yourmoney/'
      },
      5: {
        title: '端午诗词挑战',
        desc: '五月初五，五道小题',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/duanwuguoxue/'
      },
      6: {
        title: 'AI 回答清洗',
        desc: '清除各种AI格式',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/aiclean/'
      },
      7: {
        title: '那天，他第一次当爸爸',
        desc: '一起回到你出生的那一天',
        status: 'live', // ● 已建
        href: '/creationplan/repositories/myfather/'
      }
    };

    const STATUS_META = {
      live:    { label: '● 已建',   cls: 'live' },
      pending: { label: '◐ 待上线', cls: 'pending' },
      draft:   { label: '○ 待建',   cls: 'draft' }
    };

    // 数字格式化：1234 → "1.2k"，避免卡片上数字太长
    function formatCount(n) {
      if (n < 1000) return String(n);
      if (n < 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return Math.round(n / 1000) + 'k';
    }

    // 生成 100 个卡片 DOM（默认按计划排序：day 1 → 100）
    function buildCards() {
      const grid = document.getElementById('grid');
      const frag = document.createDocumentFragment();
      for (let day = 1; day <= 100; day++) {
        const real = REAL_PROJECTS[day];
        const isPlaceholder = !real;
        const title = real ? real.title : ('Day ' + day);
        const desc = real ? ('Day ' + day + ' · ' + real.desc) : '100 天造物计划 · 期待你的创意';
        const status = real ? real.status : 'draft';
        const href = real && real.href ? real.href : '#';

        const a = document.createElement('a');
        a.className = 'repo-card' + (isPlaceholder || !real.href ? ' is-placeholder' : '');
        a.setAttribute('data-day', String(day));
        a.setAttribute('data-status', status);
        a.setAttribute('data-count', '0');
        a.setAttribute('data-last', '');
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
        if (!real || !real.href) {
          a.setAttribute('href', '#');
          a.setAttribute('onclick', 'return false;');
        } else {
          a.setAttribute('href', real.href);
        }

        const head = document.createElement('div');
        head.className = 'card-head';
        const t = document.createElement('div');
        t.className = 'card-title';
        t.textContent = title;
        const arrow = document.createElement('div');
        arrow.className = 'card-arrow';
        arrow.textContent = '→';
        head.appendChild(t);
        head.appendChild(arrow);

        const d = document.createElement('div');
        d.className = 'card-desc';
        d.textContent = desc;

        const meta = document.createElement('div');
        meta.className = 'card-meta';
        const meta_tag = STATUS_META[status];
        const tag = document.createElement('span');
        tag.className = 'tag ' + meta_tag.cls;
        tag.textContent = meta_tag.label;
        const usage = document.createElement('span');
        usage.className = 'card-usage';
        usage.innerHTML = '<strong>—</strong> 人次';
        meta.appendChild(tag);
        meta.appendChild(usage);

        a.appendChild(head);
        a.appendChild(d);
        a.appendChild(meta);
        frag.appendChild(a);
      }
      grid.appendChild(frag);
    }

    // 拉取访问统计并更新每张卡片
    function fetchAndPaintUsage() {
      fetch('/creationplan/api/visit-stats', { cache: 'no-store' })
        .then((r) => r.ok ? r.json() : null)
        .then((data) => {
          if (!data || !data.visits) return;
          const cards = document.querySelectorAll('.repo-card');
          cards.forEach((c) => {
            const day = c.getAttribute('data-day');
            const v = data.visits[day];
            if (!v) return;
            c.setAttribute('data-count', String(v.count || 0));
            if (v.last) c.setAttribute('data-last', v.last);
            const usage = c.querySelector('.card-usage');
            if (usage) usage.innerHTML = '<strong>' + formatCount(v.count || 0) + '</strong> 人次';
          });
          // 已建数量统计（status=live 的卡片数）
          const built = document.querySelectorAll('.repo-card[data-status="live"]').length;
          const builtEl = document.getElementById('builtCount');
          if (builtEl) builtEl.textContent = String(built);
          // 当前排序若依赖动态数据，重排一次
          applySort(currentSort);
        })
        .catch(() => { /* 静默失败，usage 保持 "—" */ });
    }

    // 排序：按计划 / 按最新 / 按热度
    let currentSort = 'plan';
    function applySort(mode) {
      currentSort = mode;
      const grid = document.getElementById('grid');
      const cards = Array.from(grid.querySelectorAll('.repo-card'));
      cards.sort((a, b) => {
        if (mode === 'plan') {
          return Number(a.getAttribute('data-day')) - Number(b.getAttribute('data-day'));
        }
        if (mode === 'latest') {
          // 按最新：已上线的（status=live）按 Day 倒序在前；未上线的（pending/draft）按 Day 升序垫底
          const liveA = a.getAttribute('data-status') === 'live';
          const liveB = b.getAttribute('data-status') === 'live';
          const dayA = Number(a.getAttribute('data-day'));
          const dayB = Number(b.getAttribute('data-day'));
          if (liveA && !liveB) return -1;
          if (!liveA && liveB) return 1;
          if (liveA) return dayB - dayA;   // 都已上线 → Day 倒序
          return dayA - dayB;              // 都未上线 → Day 升序
        }
        if (mode === 'hot') {
          const ca = Number(a.getAttribute('data-count') || 0);
          const cb = Number(b.getAttribute('data-count') || 0);
          if (ca === cb) return Number(a.getAttribute('data-day')) - Number(b.getAttribute('data-day'));
          return cb - ca;
        }
        return 0;
      });
      const frag = document.createDocumentFragment();
      cards.forEach((c) => frag.appendChild(c));
      grid.appendChild(frag);
      // 更新 hint
      const hint = document.getElementById('sortHint');
      if (hint) {
        if (mode === 'plan') hint.textContent = 'Day 1 → Day 100';
        else if (mode === 'latest') hint.textContent = '已上线按 Day 倒序 · 未上线置底';
        else hint.textContent = '访问次数从高到低';
      }
      // 排序后重新应用搜索过滤（display:none 不影响顺序，但保险起见重跑）
      applySearchFilter();
    }

    // 搜索（保持与原版一致：title + desc 文本包含查询词则显示）
    function applySearchFilter() {
      const input = document.getElementById('searchInput');
      if (!input) return;
      const q = input.value.trim().toLowerCase();
      document.querySelectorAll('.repo-card').forEach((c) => {
        if (!q) { c.style.display = ''; return; }
        c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    }

    // 启动
    (function init() {
      buildCards();
      applySort('plan');
      fetchAndPaintUsage();

      const input = document.getElementById('searchInput');
      if (input) input.addEventListener('input', applySearchFilter);

      document.querySelectorAll('.sort-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sort-btn').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          applySort(btn.getAttribute('data-sort'));
        });
      });
    })();
  </script>
</body>
</html>
