<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 回答清洗工具</title>
    <script>
      // 累计使用人次追踪（造物库：Day 6 = AI 回答清洗）
      (function() {
        try {
          fetch('/creationplan/api/track-visit', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ day: 6 }),
            keepalive: true
          });
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Local Text Cleaner</p>
          <h1>AI 回答清洗工具</h1>
          <p class="subtitle">去 AI 味，去 Markdown，去废话，复制即可用。</p>
        </div>
        <div class="privacy-badge" aria-label="纯浏览器本地处理">
          <span></span>
          本地处理
        </div>
      </header>

      <section class="workspace" aria-label="AI 回答清洗工作区">
        <section class="pane input-pane" aria-labelledby="input-title">
          <div class="pane-head">
            <div>
              <h2 id="input-title">粘贴 AI 回答</h2>
              <p>支持 Markdown 或普通文本</p>
            </div>
            <button class="ghost-button" id="clearBtn" type="button">清空</button>
          </div>

          <textarea
            id="inputText"
            spellcheck="false"
            placeholder="把 ChatGPT、Claude、Gemini、DeepSeek、Kimi、豆包等 AI 回答粘贴到这里..."
          ></textarea>

          <div class="option-area">
            <div class="option-group">
              <p class="group-title">基础清洗</p>
              <label><input type="checkbox" data-option="markdown" checked /> 去除 Markdown 标记</label>
              <label><input type="checkbox" data-option="aiPhrases" checked /> 去除 AI 客套话</label>
              <label><input type="checkbox" data-option="blankLines" checked /> 删除多余空行</label>
              <label><input type="checkbox" data-option="lists" checked /> 统一列表格式</label>
              <label><input type="checkbox" data-option="emoji" checked /> 删除 Emoji</label>
              <label><input type="checkbox" data-option="spaces" checked /> 清理多余空格</label>
              <label><input type="checkbox" data-option="punctuation" checked /> 统一中英文标点</label>
            </div>

            <div class="option-group advanced">
              <p class="group-title">高级开关</p>
              <label><input type="checkbox" data-option="bold" /> 去掉加粗 **</label>
              <label><input type="checkbox" data-option="italic" /> 去掉斜体 *</label>
              <label><input type="checkbox" data-option="urls" /> 去掉链接 URL</label>
              <label><input type="checkbox" data-option="html" /> 去掉 HTML 标签</label>
              <label><input type="checkbox" data-option="images" /> 去掉图片 Markdown</label>
              <label><input type="checkbox" data-option="sources" /> 去掉引用来源</label>
              <label><input type="checkbox" data-option="mergeLines" /> 合并断行</label>
            </div>
          </div>

          <button class="primary-button" id="cleanBtn" type="button">开始清洗</button>
        </section>

        <section class="pane output-pane" aria-labelledby="output-title">
          <div class="pane-head">
            <div>
              <h2 id="output-title">清洗结果</h2>
              <p><span id="countText">0 字</span></p>
            </div>
            <div class="status" id="statusText" role="status">实时预览</div>
          </div>

          <textarea
            id="outputText"
            spellcheck="false"
            readonly
            placeholder="清洗后的文本会显示在这里"
          ></textarea>

          <div class="actions">
            <button id="copyBtn" type="button">复制</button>
            <button id="downloadTxtBtn" type="button">下载 TXT</button>
            <button id="downloadDocxBtn" type="button">下载 Word</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js?v=2"></script>
  </body>
</html>
