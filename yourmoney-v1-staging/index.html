<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小钱钱计时器</title>
  <script>
    // 累计使用人次追踪（造物库：Day 4 = 你最能赚钱啦）
    (function() {
      try {
        fetch('/creationplan/api/track-visit', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ day: 4 }),
          keepalive: true
        });
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --ink: #fff7dc;
      --paper: #140f0b;
      --panel: rgba(31, 25, 17, 0.88);
      --line: rgba(255, 214, 123, 0.34);
      --green: #32d083;
      --green-soft: rgba(50, 208, 131, 0.16);
      --yellow: #ffd66f;
      --gold-hot: #ffab2e;
      --red: #ff4d55;
      --blue: #315fbd;
      --muted: #bcae8a;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(90deg, rgba(255, 214, 111, 0.055) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 214, 111, 0.04) 1px, transparent 1px),
        radial-gradient(circle at 76% 10%, rgba(255, 171, 46, 0.34), transparent 24rem),
        radial-gradient(circle at 10% 88%, rgba(50, 208, 131, 0.2), transparent 28rem),
        linear-gradient(135deg, rgba(255, 77, 85, 0.12), transparent 34rem),
        var(--paper);
      background-size: 28px 28px, 28px 28px, auto, auto, auto;
      overflow-x: hidden;
    }

    body::before {
      content: "￥  $  RMB  +  ￥  +  BONUS  ￥  $  RMB";
      position: fixed;
      inset: auto -8vw 3vh auto;
      color: rgba(255, 214, 111, 0.09);
      font-family: "DIN Alternate", "Avenir Next Condensed", sans-serif;
      font-size: clamp(56px, 12vw, 180px);
      font-weight: 900;
      letter-spacing: 0;
      transform: rotate(-11deg);
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 54px;
      height: 38px;
      border: 2px solid rgba(255, 244, 179, 0.76);
      border-radius: 50% 50% 42% 42% / 66% 66% 34% 34%;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(255, 252, 205, 0.95) 0 13%, transparent 14%),
        linear-gradient(180deg, #fff1a3 0%, #ffd66f 35%, #d88b20 100%);
      box-shadow:
        0 0 28px rgba(255, 214, 111, 0.45),
        0 10px 24px rgba(216, 139, 32, 0.28);
      position: relative;
      flex: 0 0 auto;
      transform: perspective(80px) rotateX(16deg);
    }

    .mark::after {
      content: "财";
      width: 25px;
      height: 20px;
      border-radius: 999px;
      background: rgba(99, 50, 5, 0.28);
      color: #6e3807;
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%) rotateX(-16deg);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 950;
      box-shadow: inset 0 0 10px rgba(255, 247, 220, 0.18);
    }

    h1 {
      margin: 0;
      font-family: "DIN Alternate", "Avenir Next Condensed", "PingFang SC", sans-serif;
      font-size: clamp(28px, 5vw, 56px);
      letter-spacing: 0;
      line-height: 0.92;
    }

    .date-chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 214, 111, 0.1);
      box-shadow: 3px 3px 0 var(--line);
      color: var(--yellow);
      padding: 9px 14px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(330px, 0.82fr) minmax(420px, 1.18fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      background:
        linear-gradient(135deg, rgba(255, 214, 111, 0.12), transparent 42%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .calculator {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 2px solid var(--line);
      padding: 16px 18px;
      background: linear-gradient(90deg, rgba(255, 214, 111, 0.22), rgba(50, 208, 131, 0.12));
    }

    .panel-title {
      margin: 0;
      font-family: "DIN Alternate", "PingFang SC", sans-serif;
      font-size: 20px;
      letter-spacing: 0;
    }

    .status-pill {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: rgba(20, 15, 11, 0.72);
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .form {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 116px;
      gap: 8px;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 2px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 247, 220, 0.08);
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
      transition: box-shadow 150ms ease, transform 150ms ease;
    }

    input:focus,
    select:focus {
      box-shadow: 0 0 0 4px rgba(255, 214, 111, 0.18);
    }

    input:hover,
    select:hover {
      transform: translateY(-1px);
    }

    input[type="checkbox"] {
      width: 1px;
      height: 1px;
      min-height: 0;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .rest-block {
      display: grid;
      gap: 9px;
    }

    .rest-block[hidden] {
      display: none;
    }

    .weekday-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(34px, 1fr));
      gap: 6px;
    }

    .weekday {
      min-height: 40px;
      border: 2px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 247, 220, 0.08);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(37, 37, 31, 0.18);
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .weekday:hover {
      transform: translateY(-1px);
    }

    input[type="checkbox"]:checked + .weekday {
      background: linear-gradient(180deg, var(--red), #b82531);
      color: #fffdf5;
      box-shadow: 2px 2px 0 var(--line);
    }

    input[type="checkbox"]:focus + .weekday {
      box-shadow: 0 0 0 4px rgba(31, 143, 95, 0.2), 2px 2px 0 var(--line);
    }

    .schedule-note {
      border: 2px solid var(--line);
      border-radius: 6px;
      background: rgba(56, 167, 255, 0.12);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .rates {
      border-top: 2px solid var(--line);
      background: rgba(255, 214, 111, 0.1);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .rate {
      padding: 14px 16px;
      min-width: 0;
    }

    .rate + .rate {
      border-left: 2px solid var(--line);
    }

    .rate span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .rate strong {
      display: block;
      font-family: "DIN Alternate", "Avenir Next Condensed", sans-serif;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .timer {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 620px;
      position: relative;
      isolation: isolate;
    }

    .timer .panel-head {
      background: linear-gradient(90deg, rgba(50, 208, 131, 0.22), rgba(255, 214, 111, 0.18));
    }

    .meter {
      padding: clamp(22px, 4vw, 42px);
      display: grid;
      align-content: center;
      gap: 26px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 214, 111, 0.18), transparent 19rem),
        repeating-linear-gradient(115deg, transparent 0 18px, rgba(255, 214, 111, 0.035) 18px 20px);
    }

    .meter::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 2px dashed rgba(255, 214, 111, 0.22);
      border-radius: 50%;
      transform: rotate(-8deg);
      z-index: -1;
    }

    .money-stack {
      text-align: center;
      position: relative;
    }

    .earned-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .earned {
      margin: 0;
      font-family: "DIN Alternate", "Avenir Next Condensed", "PingFang SC", sans-serif;
      font-size: clamp(56px, 11vw, 132px);
      line-height: 0.9;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      color: var(--yellow);
      text-shadow:
        0 0 20px rgba(255, 214, 111, 0.34),
        4px 4px 0 rgba(255, 77, 85, 0.34);
    }

    .money-popout {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 214, 111, 0.14);
      color: var(--yellow);
      display: inline-grid;
      place-items: center;
      font-size: 22px;
      line-height: 1;
      box-shadow: 0 0 22px rgba(255, 214, 111, 0.22);
      position: absolute;
      top: -4px;
      right: clamp(0px, 4vw, 40px);
      transition: transform 150ms ease, background 150ms ease;
    }

    .money-popout:hover {
      background: rgba(255, 214, 111, 0.24);
      transform: translateY(-2px);
    }

    .time-readout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 800;
    }

    .time-box {
      border: 2px solid var(--line);
      border-radius: 6px;
      background: rgba(20, 15, 11, 0.72);
      box-shadow: 3px 3px 0 var(--line);
      padding: 10px 12px;
      color: var(--ink);
      min-width: 122px;
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      border-top: 2px solid var(--line);
    }

    .action {
      min-height: 64px;
      background: rgba(255, 247, 220, 0.08);
      border-right: 2px solid var(--line);
      color: var(--ink);
      font-weight: 950;
      font-size: 16px;
      transition: background 160ms ease, transform 160ms ease;
    }

    .action:last-child {
      border-right: 0;
    }

    .action:hover {
      background: rgba(255, 214, 111, 0.18);
    }

    .action:active {
      transform: translateY(2px);
    }

    .primary {
      background: var(--green);
      color: #08150d;
    }

    .primary:hover {
      background: #49e092;
    }

    .danger:hover {
      background: rgba(255, 77, 85, 0.28);
    }

    .ticker {
      border-top: 2px solid var(--line);
      background: linear-gradient(90deg, #040302, #120b05 48%, #040302);
      color: #fff7dc;
      overflow: hidden;
      white-space: nowrap;
      min-height: 42px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 1px 0 rgba(255, 214, 111, 0.2), inset 0 0 28px rgba(0, 0, 0, 0.7);
      font-weight: 850;
    }

    .ticker-track {
      display: inline-flex;
      gap: 28px;
      min-width: max-content;
      animation: scroll 20s linear infinite;
      padding-left: 100%;
    }

    .ticker b {
      color: var(--yellow);
      text-shadow: 0 0 12px rgba(255, 214, 111, 0.45);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--line);
      padding: 10px 16px;
      font-weight: 950;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .footer {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @keyframes scroll {
      to {
        transform: translateX(-100%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 20px, 680px);
        padding: 16px 0;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        grid-template-columns: 1fr;
      }

      .timer {
        min-height: 520px;
      }
    }

    @media (max-width: 560px) {
      .control-row,
      .two-col,
      .rates,
      .controls {
        grid-template-columns: 1fr;
      }

      .weekday-grid {
        grid-template-columns: repeat(4, minmax(42px, 1fr));
      }

      .rate + .rate,
      .action {
        border-left: 0;
        border-right: 0;
      }

      .rate + .rate,
      .action + .action {
        border-top: 2px solid var(--line);
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .earned {
        font-size: clamp(48px, 18vw, 92px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>小钱钱计时器</h1>
      </div>
      <div class="date-chip" id="todayText">今天也在到账</div>
    </header>

    <main>
      <section class="panel calculator" aria-label="工资换算">
        <div class="panel-head">
          <h2 class="panel-title">工资换算台</h2>
          <span class="status-pill" id="validityText">参数正常</span>
        </div>

        <form class="form" id="payForm">
          <div class="field">
            <label for="salary">工资金额</label>
            <div class="control-row">
              <input id="salary" name="salary" type="number" inputmode="decimal" min="0" step="100" value="12000">
              <select id="salaryType" name="salaryType" aria-label="工资周期">
                <option value="month">每月</option>
                <option value="year">每年</option>
                <option value="week">每周</option>
                <option value="day">每天</option>
                <option value="hour">每小时</option>
              </select>
            </div>
          </div>

          <div class="two-col">
            <div class="field">
              <label for="scheduleMode">排班模式</label>
              <select id="scheduleMode" name="scheduleMode">
                <option value="fixed">固定每周</option>
                <option value="alternate">大小周</option>
              </select>
            </div>
            <div class="field">
              <label for="initialMinutes">已工作分钟</label>
              <input id="initialMinutes" name="initialMinutes" type="number" inputmode="numeric" min="0" step="1" value="0">
            </div>
          </div>

          <div class="rest-block" id="fixedRestBlock">
            <label>每周休息日</label>
            <div class="weekday-grid" aria-label="每周休息日">
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="1"><span class="weekday">一</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="2"><span class="weekday">二</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="3"><span class="weekday">三</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="4"><span class="weekday">四</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="5"><span class="weekday">五</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="6" checked><span class="weekday">六</span></label>
              <label><input type="checkbox" name="fixedRest" data-rest-group="fixed" value="0" checked><span class="weekday">日</span></label>
            </div>
          </div>

          <div class="rest-block" id="alternateRestBlock" hidden>
            <label>大周休息日</label>
            <div class="weekday-grid" aria-label="大周休息日">
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="1"><span class="weekday">一</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="2"><span class="weekday">二</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="3"><span class="weekday">三</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="4"><span class="weekday">四</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="5"><span class="weekday">五</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="6"><span class="weekday">六</span></label>
              <label><input type="checkbox" name="bigRest" data-rest-group="big" value="0" checked><span class="weekday">日</span></label>
            </div>

            <label>小周休息日</label>
            <div class="weekday-grid" aria-label="小周休息日">
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="1"><span class="weekday">一</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="2"><span class="weekday">二</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="3"><span class="weekday">三</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="4"><span class="weekday">四</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="5"><span class="weekday">五</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="6" checked><span class="weekday">六</span></label>
              <label><input type="checkbox" name="smallRest" data-rest-group="small" value="0" checked><span class="weekday">日</span></label>
            </div>
          </div>

          <div class="two-col">
            <div class="field">
              <label for="startTime">上班时间</label>
              <input id="startTime" name="startTime" type="time" value="09:00">
            </div>
            <div class="field">
              <label for="endTime">下班时间</label>
              <input id="endTime" name="endTime" type="time" value="18:00">
            </div>
          </div>

          <div class="schedule-note" id="scheduleSummary">月均工作量计算中，午休照样到账</div>
        </form>

        <div class="rates" aria-live="polite">
          <div class="rate">
            <span>时薪</span>
            <strong id="hourRate">¥0.00</strong>
          </div>
          <div class="rate">
            <span>分钟薪</span>
            <strong id="minuteRate">¥0.00</strong>
          </div>
          <div class="rate">
            <span>秒薪</span>
            <strong id="secondRate">¥0.0000</strong>
          </div>
        </div>
      </section>

      <section class="panel timer" aria-label="计时器">
        <div class="panel-head">
          <h2 class="panel-title">今日到账仪表</h2>
          <span class="status-pill" id="runState">未开始</span>
        </div>

        <div class="meter">
          <div class="money-stack">
            <button class="money-popout" id="openMiniWindow" type="button" title="打开收益小窗" aria-label="打开收益小窗">↗</button>
            <p class="earned-label">当前已赚</p>
            <p class="earned" id="earnedMoney">¥0.00</p>
          </div>

          <div class="time-readout">
            <span class="time-box" id="elapsedText">00:00:00</span>
            <span id="nextMinuteText">下一分钟 +¥0.00</span>
          </div>
        </div>

        <div class="controls">
          <button class="action primary" id="startPause" type="button">开始计时</button>
          <button class="action" id="addMinute" type="button">+1 分钟</button>
          <button class="action danger" id="resetTimer" type="button">重置</button>
        </div>

        <div class="ticker" aria-hidden="true">
          <div class="ticker-track" id="tickerTrack"></div>
        </div>
      </section>
    </main>

    <footer class="footer">提示：这里的工资按你的输入口径计算，可输入税前、税后或实际到手金额。</footer>
  </div>

  <div class="toast" id="toast">又到账一分钟</div>

  <script>
    const form = document.getElementById("payForm");
    const salary = document.getElementById("salary");
    const salaryType = document.getElementById("salaryType");
    const scheduleMode = document.getElementById("scheduleMode");
    const fixedRestBlock = document.getElementById("fixedRestBlock");
    const alternateRestBlock = document.getElementById("alternateRestBlock");
    const startTime = document.getElementById("startTime");
    const endTime = document.getElementById("endTime");
    const initialMinutes = document.getElementById("initialMinutes");
    const scheduleSummary = document.getElementById("scheduleSummary");
    const hourRate = document.getElementById("hourRate");
    const minuteRate = document.getElementById("minuteRate");
    const secondRate = document.getElementById("secondRate");
    const earnedMoney = document.getElementById("earnedMoney");
    const elapsedText = document.getElementById("elapsedText");
    const nextMinuteText = document.getElementById("nextMinuteText");
    const openMiniWindow = document.getElementById("openMiniWindow");
    const startPause = document.getElementById("startPause");
    const addMinute = document.getElementById("addMinute");
    const resetTimer = document.getElementById("resetTimer");
    const runState = document.getElementById("runState");
    const validityText = document.getElementById("validityText");
    const tickerTrack = document.getElementById("tickerTrack");
    const toast = document.getElementById("toast");
    const todayText = document.getElementById("todayText");
    const weeksPerMonth = 365.2425 / 7 / 12;

    let isRunning = false;
    let baseElapsedSeconds = 0;
    let startedAt = 0;
    let lastWholeMinute = 0;
    let toastTimer = 0;
    let tickerMarkup = "";
    let miniWindow = null;

    const money = new Intl.NumberFormat("zh-CN", {
      style: "currency",
      currency: "CNY",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const preciseMoney = new Intl.NumberFormat("zh-CN", {
      style: "currency",
      currency: "CNY",
      minimumFractionDigits: 4,
      maximumFractionDigits: 4
    });

    const date = new Intl.DateTimeFormat("zh-CN", {
      month: "long",
      day: "numeric",
      weekday: "short"
    }).format(new Date());

    todayText.textContent = `${date} · 今天也在到账`;

    function numberFrom(input) {
      return Number.parseFloat(input.value) || 0;
    }

    function timeToMinutes(value) {
      const parts = value.split(":").map(Number);
      if (parts.length < 2 || parts.some(Number.isNaN)) {
        return 0;
      }
      return parts[0] * 60 + parts[1];
    }

    function paidHoursPerDay() {
      const start = timeToMinutes(startTime.value);
      const end = timeToMinutes(endTime.value);

      if (start === end) {
        return 0;
      }

      const rawMinutes = end > start ? end - start : end + 24 * 60 - start;
      return Math.max(0, rawMinutes / 60);
    }

    function restCount(group) {
      return document.querySelectorAll(`[data-rest-group="${group}"]:checked`).length;
    }

    function workDaysInWeek(group) {
      return Math.max(0, 7 - restCount(group));
    }

    function averageWorkDaysPerWeek() {
      if (scheduleMode.value === "alternate") {
        return (workDaysInWeek("big") + workDaysInWeek("small")) / 2;
      }
      return workDaysInWeek("fixed");
    }

    function updateScheduleMode() {
      const alternate = scheduleMode.value === "alternate";
      fixedRestBlock.hidden = alternate;
      alternateRestBlock.hidden = !alternate;
    }

    function scheduleLabel() {
      const dailyHours = paidHoursPerDay();
      const weeklyDays = averageWorkDaysPerWeek();
      const monthlyDays = weeklyDays * weeksPerMonth;
      const monthlyHours = monthlyDays * dailyHours;

      return `月均约 ${monthlyDays.toFixed(1)} 天 / ${monthlyHours.toFixed(1)} 小时，午休照样到账`;
    }

    function ratePerHour() {
      const amount = numberFrom(salary);
      const paidDayHours = paidHoursPerDay();
      const weeklyDays = averageWorkDaysPerWeek();
      const monthlyDays = weeklyDays * weeksPerMonth;

      if (amount <= 0 || paidDayHours <= 0) {
        return 0;
      }

      if (salaryType.value === "hour") {
        return amount;
      }

      if (salaryType.value === "day") {
        return amount / paidDayHours;
      }

      if (monthlyDays <= 0) {
        return 0;
      }

      if (salaryType.value === "week") {
        return amount / Math.max(weeklyDays * paidDayHours, 1);
      }

      if (salaryType.value === "year") {
        return amount / (monthlyDays * 12 * paidDayHours);
      }

      return amount / (monthlyDays * paidDayHours);
    }

    function currentElapsedSeconds() {
      if (!isRunning) {
        return baseElapsedSeconds;
      }
      return baseElapsedSeconds + (performance.now() - startedAt) / 1000;
    }

    function formatDuration(totalSeconds) {
      const rounded = Math.floor(totalSeconds);
      const h = String(Math.floor(rounded / 3600)).padStart(2, "0");
      const m = String(Math.floor((rounded % 3600) / 60)).padStart(2, "0");
      const s = String(rounded % 60).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    function showMinuteToast(amount) {
      toast.textContent = `又到账一分钟：+${money.format(amount)}`;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function miniWindowHtml() {
      return `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>收益小窗</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 82% 12%, rgba(255, 214, 111, 0.3), transparent 9rem),
        radial-gradient(circle at 10% 90%, rgba(50, 208, 131, 0.18), transparent 9rem),
        #100b07;
      color: #fff7dc;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .mini {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 214, 111, 0.36);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255, 214, 111, 0.12), rgba(50, 208, 131, 0.08));
      box-shadow: inset 0 0 44px rgba(255, 214, 111, 0.08);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      position: relative;
    }
    .mini::before {
      content: "￥ ￥ ￥";
      position: absolute;
      right: 10px;
      bottom: 4px;
      color: rgba(255, 214, 111, 0.08);
      font-size: 54px;
      font-weight: 900;
    }
    .label {
      color: #bcae8a;
      font-size: 12px;
      font-weight: 900;
    }
    .money {
      color: #ffd66f;
      font-family: "DIN Alternate", "Avenir Next Condensed", sans-serif;
      font-size: clamp(42px, 17vw, 74px);
      line-height: 0.9;
      text-shadow: 0 0 22px rgba(255, 214, 111, 0.38);
      overflow-wrap: anywhere;
      max-width: 100%;
      padding: 0 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      color: #fff7dc;
      font-size: 13px;
      font-weight: 800;
    }
    .pill {
      border: 1px solid rgba(255, 214, 111, 0.3);
      border-radius: 999px;
      padding: 5px 8px;
      background: rgba(255, 247, 220, 0.08);
    }
  </style>
</head>
<body>
  <main class="mini">
    <div class="label">当前已赚</div>
    <div class="money" id="miniEarned">¥0.00</div>
    <div class="row">
      <span class="pill" id="miniElapsed">00:00:00</span>
      <span class="pill" id="miniMinute">+¥0.00 / 分钟</span>
    </div>
    <div class="label" id="miniState">未开始</div>
  </main>
</body>
</html>`;
    }

    function writeMiniWindow(win) {
      win.document.open();
      win.document.write(miniWindowHtml());
      win.document.close();
    }

    async function openEarningWindow() {
      if ("documentPictureInPicture" in window) {
        try {
          miniWindow = await window.documentPictureInPicture.requestWindow({
            width: 360,
            height: 220
          });
          writeMiniWindow(miniWindow);
          render();
          return;
        } catch (error) {
          miniWindow = null;
        }
      }

      const features = "popup=yes,width=360,height=220,left=80,top=80,menubar=no,toolbar=no,location=no,status=no,scrollbars=no,resizable=yes";
      miniWindow = window.open("", "hourlyEarningMiniWindow", features);

      if (!miniWindow) {
        showToast("弹窗被浏览器拦截了");
        return;
      }

      writeMiniWindow(miniWindow);
      miniWindow.focus();
      render();
    }

    function updateMiniWindow(data) {
      if (!miniWindow || miniWindow.closed) {
        miniWindow = null;
        return;
      }

      const doc = miniWindow.document;
      const miniEarned = doc.getElementById("miniEarned");
      const miniElapsed = doc.getElementById("miniElapsed");
      const miniMinute = doc.getElementById("miniMinute");
      const miniState = doc.getElementById("miniState");

      if (!miniEarned || !miniElapsed || !miniMinute || !miniState) {
        return;
      }

      miniEarned.textContent = data.earnedText;
      miniElapsed.textContent = data.elapsedText;
      miniMinute.textContent = `+${data.minuteText} / 分钟`;
      miniState.textContent = data.stateText;
    }

    function refreshTicker(minutePay, hourlyPay) {
      const items = [
        `每分钟 <b>${money.format(minutePay)}</b>`,
        `每小时 <b>${money.format(hourlyPay)}</b>`,
        `${scheduleLabel()}`,
        `站会 15 分钟约 <b>${money.format(minutePay * 15)}</b>`,
        `一杯咖啡 28 元约 <b>${minutePay > 0 ? Math.ceil(28 / minutePay) : 0}</b> 分钟`,
        `今天的进度正在变成数字`
      ];
      const markup = items.map((item) => `<span>${item}</span>`).join("");
      if (markup !== tickerMarkup) {
        tickerMarkup = markup;
        tickerTrack.innerHTML = markup;
      }
    }

    function render() {
      const hourlyPay = ratePerHour();
      const minutePay = hourlyPay / 60;
      const secondPay = hourlyPay / 3600;
      const elapsed = currentElapsedSeconds() + numberFrom(initialMinutes) * 60;
      const earned = elapsed * secondPay;
      const wholeMinute = Math.floor(elapsed / 60);

      hourRate.textContent = money.format(hourlyPay);
      minuteRate.textContent = money.format(minutePay);
      secondRate.textContent = preciseMoney.format(secondPay);
      const earnedText = money.format(earned);
      const elapsedDuration = formatDuration(elapsed);
      const minuteText = money.format(minutePay);
      earnedMoney.textContent = earnedText;
      elapsedText.textContent = elapsedDuration;
      nextMinuteText.textContent = `下一分钟 +${money.format(minutePay)}`;

      const valid = hourlyPay > 0;
      scheduleSummary.textContent = scheduleLabel();
      validityText.textContent = valid ? `月均 ${Math.round(averageWorkDaysPerWeek() * weeksPerMonth * 10) / 10} 天` : "需要有效参数";
      const stateText = isRunning ? "计时中" : elapsed > 0 ? "已暂停" : "未开始";
      runState.textContent = stateText;

      if (isRunning && wholeMinute > lastWholeMinute) {
        showMinuteToast(minutePay);
      }
      lastWholeMinute = wholeMinute;

      refreshTicker(minutePay, hourlyPay);
      updateMiniWindow({
        earnedText,
        elapsedText: elapsedDuration,
        minuteText,
        stateText
      });
    }

    function tick() {
      render();
      requestAnimationFrame(tick);
    }

    function preserveRunningElapsed() {
      if (isRunning) {
        baseElapsedSeconds = currentElapsedSeconds();
        startedAt = performance.now();
      }
    }

    form.addEventListener("input", () => {
      preserveRunningElapsed();
      updateScheduleMode();
      render();
    });

    form.addEventListener("change", () => {
      preserveRunningElapsed();
      updateScheduleMode();
      render();
    });

    openMiniWindow.addEventListener("click", openEarningWindow);

    startPause.addEventListener("click", () => {
      if (isRunning) {
        baseElapsedSeconds += (performance.now() - startedAt) / 1000;
        isRunning = false;
        startPause.textContent = "继续计时";
      } else {
        startedAt = performance.now();
        isRunning = true;
        startPause.textContent = "暂停";
      }
      render();
    });

    addMinute.addEventListener("click", () => {
      baseElapsedSeconds += 60;
      showMinuteToast(ratePerHour() / 60);
      render();
    });

    resetTimer.addEventListener("click", () => {
      isRunning = false;
      baseElapsedSeconds = 0;
      lastWholeMinute = 0;
      startedAt = 0;
      initialMinutes.value = "0";
      startPause.textContent = "开始计时";
      render();
    });

    updateScheduleMode();
    render();
    tick();
  </script>
</body>
</html>
