<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>端午诗词答题</title>
  <script>
    // 累计使用人次追踪（造物库：Day 5 = 端午诗词挑战）
    (function() {
      try {
        fetch('/creationplan/api/track-visit', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ day: 5 }),
          keepalive: true
        });
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --ink: #23322d;
      --ink-soft: #516961;
      --paper: rgba(255, 252, 242, 0.86);
      --paper-solid: #fffaf0;
      --reed: #496f5d;
      --reed-dark: #244a3f;
      --cinnabar: #ad4b37;
      --gold: #b99151;
      --mist: rgba(248, 246, 235, 0.72);
      --line: rgba(62, 91, 79, 0.2);
      --shadow: 0 24px 80px rgba(35, 50, 45, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      background: #edf1e8;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(22px, 4vw, 56px);
      background-image:
        linear-gradient(90deg, rgba(238, 246, 231, 0.7), rgba(255, 249, 237, 0.14) 34%, rgba(255, 249, 237, 0.45)),
        url("./duanwu-shanshui.png");
      background-size: cover;
      background-position: center;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .stage::before {
      inset: 0;
      background:
        radial-gradient(circle at 72% 18%, rgba(173, 75, 55, 0.14), transparent 12%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(35, 50, 45, 0.12));
    }

    .stage::after {
      width: min(58vw, 720px);
      height: min(58vw, 720px);
      left: -16vw;
      top: -20vw;
      border: 1px solid rgba(36, 74, 63, 0.14);
      border-radius: 50%;
    }

    .quiz-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 860px);
      min-height: min(680px, calc(100vh - 44px));
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
    }

    .paper {
      position: relative;
      isolation: isolate;
      width: min(100%, 720px);
      margin-left: clamp(0px, 4vw, 72px);
      padding: clamp(26px, 5vw, 56px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), transparent 42%),
        var(--paper);
      border: 1px solid rgba(83, 111, 92, 0.28);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(11px);
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(173, 75, 55, 0.16);
      border-radius: 4px;
      z-index: -1;
    }

    .paper::after {
      content: "";
      position: absolute;
      width: 168px;
      height: 168px;
      right: -46px;
      bottom: -54px;
      border: 1px solid rgba(173, 75, 55, 0.26);
      border-radius: 50%;
      z-index: -1;
    }

    .seal {
      position: absolute;
      top: 28px;
      right: 30px;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      color: rgba(255, 250, 240, 0.92);
      background: var(--cinnabar);
      border-radius: 6px;
      font-family: "STKaiti", "Kaiti SC", serif;
      font-size: 20px;
      line-height: 1.05;
      transform: rotate(4deg);
      box-shadow: 0 10px 24px rgba(173, 75, 55, 0.22);
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--cinnabar);
      font-family: "Kaiti SC", "STKaiti", serif;
      font-size: clamp(18px, 2.2vw, 25px);
      letter-spacing: 0;
    }

    .intro-copy {
      margin: 0;
      max-width: 560px;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.36;
      font-weight: 700;
      text-wrap: balance;
    }

    .intro-copy span {
      color: var(--reed-dark);
    }

    .sub-copy {
      margin: 24px 0 0;
      max-width: 510px;
      color: var(--ink-soft);
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.85;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .primary-btn {
      margin-top: 34px;
      padding: 0 30px;
      color: #fffaf0;
      background: linear-gradient(135deg, var(--reed-dark), var(--reed));
      box-shadow: 0 16px 32px rgba(36, 74, 63, 0.24);
      font-size: 18px;
      font-weight: 700;
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .option:hover {
      transform: translateY(-2px);
    }

    .primary-btn:focus-visible,
    .ghost-btn:focus-visible,
    .option:focus-visible {
      outline: 3px solid rgba(173, 75, 55, 0.36);
      outline-offset: 3px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
      color: var(--ink-soft);
      font-size: 15px;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .progress i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(73, 111, 93, 0.2);
    }

    .progress i.active {
      background: var(--reed);
    }

    .poem-title {
      margin: 0 0 16px;
      color: var(--cinnabar);
      font-family: "Kaiti SC", "STKaiti", serif;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: 0;
    }

    .question {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      line-height: 1.48;
      font-weight: 700;
      text-wrap: balance;
    }

    .blank {
      color: var(--reed-dark);
      text-decoration: underline;
      text-decoration-color: rgba(173, 75, 55, 0.42);
      text-underline-offset: 8px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 34px;
    }

    .option {
      position: relative;
      min-height: 68px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      color: var(--ink);
      background: rgba(255, 250, 240, 0.82);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 12px 26px rgba(35, 50, 45, 0.08);
    }

    .option b {
      width: 34px;
      height: 34px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      color: var(--reed-dark);
      border: 1px solid rgba(73, 111, 93, 0.28);
      border-radius: 50%;
      font-family: Georgia, serif;
    }

    .option span {
      min-width: 0;
      font-size: clamp(17px, 2.1vw, 22px);
      line-height: 1.3;
    }

    .option.correct {
      color: #fffaf0;
      background: linear-gradient(135deg, var(--reed-dark), var(--reed));
    }

    .option.wrong {
      color: #fffaf0;
      background: linear-gradient(135deg, #8c3328, var(--cinnabar));
    }

    .option.correct b,
    .option.wrong b {
      color: #fffaf0;
      border-color: rgba(255, 250, 240, 0.5);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(23, 36, 32, 0.42);
      backdrop-filter: blur(10px);
    }

    .modal.show {
      display: grid;
    }

    .result {
      width: min(100%, 520px);
      padding: clamp(28px, 5vw, 44px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent),
        var(--paper-solid);
      border: 1px solid rgba(83, 111, 92, 0.28);
      border-radius: 8px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .score {
      margin: 0;
      color: var(--cinnabar);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(54px, 12vw, 86px);
      line-height: 1;
    }

    .result h2 {
      margin: 16px 0 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.3;
    }

    .result p {
      margin: 16px auto 0;
      max-width: 360px;
      color: var(--ink-soft);
      font-size: 18px;
      line-height: 1.7;
    }

    .ghost-btn {
      margin-top: 26px;
      padding: 0 24px;
      color: var(--reed-dark);
      background: rgba(73, 111, 93, 0.12);
      border: 1px solid rgba(73, 111, 93, 0.24);
      font-weight: 700;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 680px) {
      .stage {
        align-items: start;
        padding: 16px;
        background-position: 38% center;
      }

      .quiz-shell {
        min-height: calc(100vh - 32px);
      }

      .paper {
        margin: 0;
        padding: 28px 20px;
      }

      .seal {
        top: 18px;
        right: 18px;
        width: 46px;
        height: 46px;
        font-size: 17px;
      }

      .intro-copy {
        padding-right: 54px;
      }

      .options {
        grid-template-columns: 1fr;
        gap: 11px;
        margin-top: 26px;
      }

      .option {
        min-height: 62px;
      }

      .topline {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="quiz-shell" aria-live="polite">
      <div class="paper">
        <div class="seal" aria-hidden="true">端<br>午</div>

        <div id="intro">
          <p class="kicker">五月初五 · 诗词闯关</p>
          <h1 class="intro-copy">
            五月初五诵《离骚》，五道小题见真章。
          </h1>
          <p class="sub-copy">
            一字之差，最考验你的肌肉记忆。<br>
            开始挑战，看看你能否满分通关！
          </p>
          <button class="primary-btn" id="startBtn" type="button">开始答题</button>
        </div>

        <div id="quiz" hidden>
          <div class="topline">
            <div id="questionCount">第 1 题 / 共 5 题</div>
            <div class="progress" id="progress" aria-label="答题进度"></div>
          </div>
          <h2 class="poem-title" id="poemTitle"></h2>
          <p class="question" id="questionText"></p>
          <div class="options" id="options"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result">
      <p class="score" id="scoreText">0/5</p>
      <h2 id="resultTitle"></h2>
      <p id="resultCopy"></p>
      <button class="ghost-btn" id="restartBtn" type="button">再挑战一次</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        title: "第 1 题《离骚》",
        text: "路漫漫其修远兮，吾将上下而（ ）。",
        options: ["求索", "索求", "求寻", "寻索"],
        answer: 0
      },
      {
        title: "第 2 题《望岳》",
        text: "会当（ ）绝顶，一览众山（ ）。",
        options: ["凌 / 小", "临 / 小", "凌 / 晓", "临 / 晓"],
        answer: 0
      },
      {
        title: "第 3 题《游子吟》",
        text: "谁言寸草（ ），报得三春（ ）。",
        options: ["心 / 晖", "心 / 辉", "新 / 晖", "新 / 辉"],
        answer: 0
      },
      {
        title: "第 4 题《泊船瓜洲》",
        text: "春风又（ ）江南岸，明月何时照我（ ）。",
        options: ["过 / 回", "绿 / 还", "过 / 还", "绿 / 回"],
        answer: 1
      },
      {
        title: "第 5 题《观书有感》",
        text: "问渠那得清如（ ），（ ）有源头活水来。",
        options: ["此 / 为", "许 / 喂", "许 / 为", "此 / 喂"],
        answer: 2
      }
    ];

    const resultLines = [
      "建议重新翻开语文课本，<br>不过大家都经历过这个阶段。",
      "建议重新翻开语文课本，<br>不过大家都经历过这个阶段。",
      "会背，但总在关键字上翻车。",
      "肌肉记忆开始背刺你了。",
      "国学达人，就差一点点。",
      "语文课代表，背得滚瓜烂熟。"
    ];

    const intro = document.querySelector("#intro");
    const quiz = document.querySelector("#quiz");
    const startBtn = document.querySelector("#startBtn");
    const restartBtn = document.querySelector("#restartBtn");
    const questionCount = document.querySelector("#questionCount");
    const progress = document.querySelector("#progress");
    const poemTitle = document.querySelector("#poemTitle");
    const questionText = document.querySelector("#questionText");
    const optionsEl = document.querySelector("#options");
    const modal = document.querySelector("#modal");
    const scoreText = document.querySelector("#scoreText");
    const resultTitle = document.querySelector("#resultTitle");
    const resultCopy = document.querySelector("#resultCopy");

    let current = 0;
    let score = 0;
    let locked = false;

    function renderProgress() {
      progress.innerHTML = questions
        .map((_, index) => `<i class="${index <= current ? "active" : ""}"></i>`)
        .join("");
    }

    function markBlanks(text) {
      return text.replaceAll("（ ）", "<span class=\"blank\">（　）</span>");
    }

    function renderQuestion() {
      const item = questions[current];
      locked = false;
      questionCount.textContent = `第 ${current + 1} 题 / 共 ${questions.length} 题`;
      poemTitle.textContent = item.title;
      questionText.innerHTML = markBlanks(item.text);
      renderProgress();

      optionsEl.innerHTML = item.options
        .map((option, index) => `
          <button class="option" type="button" data-index="${index}">
            <b>${String.fromCharCode(65 + index)}</b>
            <span>${option}</span>
          </button>
        `)
        .join("");
    }

    function getResultTitle(finalScore) {
      return finalScore === 5 ? "满分通关" : "挑战结束";
    }

    function endGame(finalScore) {
      scoreText.textContent = `${finalScore}/5`;
      resultTitle.textContent = getResultTitle(finalScore);
      resultCopy.innerHTML = resultLines[finalScore];
      modal.classList.add("show");
      restartBtn.focus();
    }

    function chooseAnswer(button) {
      if (locked) return;
      locked = true;

      const selected = Number(button.dataset.index);
      const item = questions[current];
      const isCorrect = selected === item.answer;
      button.classList.add(isCorrect ? "correct" : "wrong");

      if (!isCorrect) {
        setTimeout(() => endGame(score), 520);
        return;
      }

      score += 1;
      setTimeout(() => {
        if (score === questions.length) {
          endGame(score);
        } else {
          current += 1;
          renderQuestion();
        }
      }, 520);
    }

    function startGame() {
      current = 0;
      score = 0;
      intro.hidden = true;
      quiz.hidden = false;
      modal.classList.remove("show");
      renderQuestion();
    }

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);
    optionsEl.addEventListener("click", (event) => {
      const button = event.target.closest(".option");
      if (button) chooseAnswer(button);
    });
  </script>
</body>
</html>
