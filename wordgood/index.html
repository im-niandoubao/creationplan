<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标点整理台</title>
  <script>
    // 累计使用人次追踪（造物库：Day 3 = 标点整理台）
    (function() {
      try {
        fetch('/creationplan/api/track-visit', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ day: 3 }),
          keepalive: true
        });
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --ink: #1f2428;
      --muted: #65716f;
      --paper: #fbfaf4;
      --panel: #ffffff;
      --line: #d8d4c8;
      --green: #2f6d5c;
      --red: #bb4e35;
      --gold: #d6a83b;
      --blue: #2f5f8f;
      --shadow: 0 18px 44px rgba(37, 36, 31, .12);
      --mono: "Courier New", "SFMono-Regular", monospace;
      --serif: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      --sans: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        linear-gradient(90deg, rgba(47, 109, 92, .06) 1px, transparent 1px),
        linear-gradient(rgba(47, 109, 92, .05) 1px, transparent 1px),
        radial-gradient(circle at 10% 0%, rgba(214, 168, 59, .18), transparent 28%),
        var(--paper);
      background-size: 28px 28px, 28px 28px, auto, auto;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1520px, calc(100% - 36px));
      margin: 0 auto;
      padding: 26px 0 30px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: end;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 5.4rem);
      line-height: .92;
      letter-spacing: 0;
      font-weight: 900;
    }

    .tagline {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.65;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      gap: 8px;
      min-width: 300px;
    }

    .stat {
      border: 1px solid var(--ink);
      background: rgba(255, 255, 255, .58);
      padding: 10px 12px;
    }

    .stat strong {
      display: block;
      font-family: var(--mono);
      font-size: 1.45rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: .76rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(270px, 330px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      margin-top: 18px;
    }

    .rules {
      position: sticky;
      top: 16px;
      border: 2px solid var(--ink);
      background: rgba(255, 255, 255, .75);
      box-shadow: var(--shadow);
    }

    .rules-head,
    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 50px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .rules-head h2,
    .editor-head h2 {
      margin: 0;
      font-size: .92rem;
      letter-spacing: .08em;
      font-weight: 800;
    }

    .preset {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .preset button,
    .tool-btn {
      min-height: 36px;
      color: var(--ink);
      background: #f4f1e8;
      border: 1px solid var(--ink);
      border-radius: 0;
      font-weight: 750;
      transition: transform .16s ease, background .16s ease, color .16s ease;
    }

    .preset button:hover,
    .tool-btn:hover {
      transform: translateY(-1px);
      background: var(--gold);
    }

    .preset button.active {
      background: var(--ink);
      color: #fff;
    }

    .rule-list {
      display: grid;
      gap: 0;
    }

    .rule {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 0;
      min-height: 66px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .74);
    }

    .rule:last-child {
      border-bottom: 0;
    }

    .rule input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch {
      display: grid;
      place-items: center;
      border-right: 1px solid var(--line);
    }

    .switch span {
      width: 22px;
      height: 22px;
      border: 2px solid var(--ink);
      background: #fff;
      display: block;
      position: relative;
    }

    .rule input:checked + .switch span {
      background: var(--green);
    }

    .rule input:checked + .switch span::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 7px;
      height: 13px;
      border: solid #fff;
      border-width: 0 3px 3px 0;
      transform: rotate(42deg);
    }

    .rule-text {
      padding: 10px 12px;
    }

    .rule-text b {
      display: block;
      font-size: .94rem;
      line-height: 1.25;
    }

    .rule-text small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      line-height: 1.35;
    }

    .find-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    .find-row input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--ink);
      background: #fffdf8;
      padding: 8px 10px;
      outline: none;
    }

    .find-row input:focus,
    textarea:focus {
      box-shadow: 0 0 0 3px rgba(214, 168, 59, .35);
    }

    .editors {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      min-width: 0;
    }

    .editor {
      min-width: 0;
      border: 2px solid var(--ink);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .editor-head {
      background: #fffdf8;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tool-btn {
      display: inline-grid;
      grid-auto-flow: column;
      align-items: center;
      gap: 7px;
      min-width: 38px;
      padding: 0 10px;
      font-size: .86rem;
    }

    .tool-btn.danger:hover {
      color: #fff;
      background: var(--red);
    }

    .tool-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 62vh;
      resize: vertical;
      border: 0;
      outline: none;
      padding: 18px;
      color: var(--ink);
      background:
        linear-gradient(rgba(31, 36, 40, .06) 1px, transparent 1px),
        #fff;
      background-size: 100% 34px;
      font-family: var(--serif);
      font-size: 1.12rem;
      line-height: 34px;
      letter-spacing: 0;
    }

    #outputText {
      color: #15211d;
      background-color: #fbfff9;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: #fff;
      padding: 12px 16px;
      border: 1px solid var(--ink);
      box-shadow: var(--shadow);
      transition: opacity .2s ease, transform .2s ease;
      font-weight: 750;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1060px) {
      .workspace,
      .editors,
      .topbar {
        grid-template-columns: 1fr;
      }

      .rules {
        position: static;
      }

      .stats {
        min-width: 0;
      }

      textarea {
        min-height: 38vh;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1520px);
        padding-top: 14px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .preset,
      .find-row {
        grid-template-columns: 1fr;
      }

      .rules-head,
      .editor-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>标点整理台</h1>
        <p class="tagline">把混杂标点、空格、分号、冒号和重复符号统一成适合中文或英文文稿的样子。</p>
      </div>
      <section class="stats" aria-label="文本统计">
        <div class="stat">
          <strong id="charCount">0</strong>
          <span>字符</span>
        </div>
        <div class="stat">
          <strong id="changeCount">0</strong>
          <span>变更</span>
        </div>
        <div class="stat">
          <strong id="lineCount">1</strong>
          <span>行</span>
        </div>
      </section>
    </header>

    <section class="workspace">
      <aside class="rules" aria-label="整理规则">
        <div class="rules-head">
          <h2>规则</h2>
          <button class="tool-btn" id="sampleBtn" type="button" title="载入样例">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/></svg>
            样例
          </button>
        </div>
        <div class="preset" role="group" aria-label="预设">
          <button type="button" id="zhPreset" class="active">中文文稿</button>
          <button type="button" id="enPreset">英文文稿</button>
        </div>
        <div class="rule-list">
          <label class="rule">
            <input type="radio" name="punctuationDirection" id="ruleEnToZh" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>英文标点改中文标点</b><small>, . ? ! : ; () [] "" '' 等</small></span>
          </label>
          <label class="rule">
            <input type="radio" name="punctuationDirection" id="ruleZhToEn">
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>中文标点改英文标点</b><small>，。？！：“”‘’（） 等</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleSpacesToComma" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>空格改逗号</b><small>连续空格、制表符统一成一个中文逗号</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleColonSemicolon" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>分号冒号改逗号</b><small>； ; ： : 全部换成逗号</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleEllipsisDash" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>省略号与破折号规范</b><small>.../……、--/—— 归一</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleCollapse" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>合并重复标点</b><small>多个逗号、句号、问号、叹号保留一个</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleTrimLines" checked>
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>清理行首行尾空白</b><small>保留换行结构</small></span>
          </label>
          <label class="rule">
            <input type="checkbox" id="ruleCustom">
            <span class="switch" aria-hidden="true"><span></span></span>
            <span class="rule-text"><b>自定义替换</b><small>支持普通文本，不使用正则</small></span>
          </label>
        </div>
        <div class="find-row">
          <input id="findText" type="text" placeholder="查找">
          <input id="replaceText" type="text" placeholder="替换为">
        </div>
      </aside>

      <section class="editors">
        <article class="editor">
          <div class="editor-head">
            <h2>原文</h2>
            <div class="actions">
              <button class="tool-btn danger" id="clearBtn" type="button" title="清空">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
                清空
              </button>
            </div>
          </div>
          <textarea id="inputText" spellcheck="false" placeholder="在这里粘贴文稿"></textarea>
        </article>

        <article class="editor">
          <div class="editor-head">
            <h2>结果</h2>
            <div class="actions">
              <button class="tool-btn" id="copyBtn" type="button" title="复制结果">
                <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                复制
              </button>
              <button class="tool-btn" id="downloadTxtBtn" type="button" title="下载为 TXT 文本">下载 .txt</button>
              <button class="tool-btn" id="downloadDocxBtn" type="button" title="下载为 Word 文档">下载 .docx</button>
            </div>
          </div>
          <textarea id="outputText" readonly spellcheck="false" placeholder="整理后的文字会出现在这里"></textarea>
        </article>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">已复制</div>

  <script>
    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");
    const charCount = document.getElementById("charCount");
    const changeCount = document.getElementById("changeCount");
    const lineCount = document.getElementById("lineCount");
    const toast = document.getElementById("toast");

    const rules = {
      enToZh: document.getElementById("ruleEnToZh"),
      zhToEn: document.getElementById("ruleZhToEn"),
      spacesToComma: document.getElementById("ruleSpacesToComma"),
      colonSemicolon: document.getElementById("ruleColonSemicolon"),
      ellipsisDash: document.getElementById("ruleEllipsisDash"),
      collapse: document.getElementById("ruleCollapse"),
      trimLines: document.getElementById("ruleTrimLines"),
      custom: document.getElementById("ruleCustom")
    };

    const enToZhMap = new Map([
      [",", "，"], [".", "。"], ["?", "？"], ["!", "！"],
      [":", "："], [";", "；"], ["(", "（"], [")", "）"],
      ["[", "【"], ["]", "】"], ["{", "〔"], ["}", "〕"],
      ["<", "《"], [">", "》"]
    ]);

    const zhToEnMap = new Map([
      ["，", ","], ["。", "."], ["、", ","], ["？", "?"], ["！", "!"],
      ["：", ":"], ["；", ";"], ["（", "("], ["）", ")"],
      ["【", "["], ["】", "]"], ["〔", "{"], ["〕", "}"],
      ["《", "<"], ["》", ">"], ["“", "\""], ["”", "\""],
      ["‘", "'"], ["’", "'"]
    ]);

    function convertEnglishPunctuation(text) {
      let doubleQuoteOpen = true;
      let singleQuoteOpen = true;
      let result = "";

      for (const char of text) {
        if (char === "\"") {
          result += doubleQuoteOpen ? "“" : "”";
          doubleQuoteOpen = !doubleQuoteOpen;
        } else if (char === "'") {
          result += singleQuoteOpen ? "‘" : "’";
          singleQuoteOpen = !singleQuoteOpen;
        } else {
          result += enToZhMap.get(char) || char;
        }
      }

      return result;
    }

    function convertChinesePunctuation(text) {
      return [...text].map((char) => zhToEnMap.get(char) || char).join("");
    }

    function normalizeEllipsisAndDash(text, chineseMode) {
      if (chineseMode) {
        return text
          .replace(/\.{3,}/g, "……")
          .replace(/。{3,}/g, "……")
          .replace(/…{1,}/g, "……")
          .replace(/-{2,}/g, "——");
      }

      return text
        .replace(/…{1,}/g, "...")
        .replace(/—{2,}/g, "--");
    }

    function collapsePunctuation(text, chineseMode) {
      if (chineseMode) {
        return text
          .replace(/，{2,}/g, "，")
          .replace(/。{2,}/g, "。")
          .replace(/！{2,}/g, "！")
          .replace(/？{2,}/g, "？")
          .replace(/、{2,}/g, "、");
      }

      return text
        .replace(/,{2,}/g, ",")
        .replace(/\.{4,}/g, "...")
        .replace(/!{2,}/g, "!")
        .replace(/\?{2,}/g, "?");
    }

    function cleanCommaAroundChinesePunctuation(text) {
      return text
        .replace(/，+([。！？、）】》”’])/g, "$1")
        .replace(/([（【《“‘])，+/g, "$1")
        .replace(/，*——，*/g, "——")
        .replace(/，*……，*/g, "……");
    }

    function tidy(text) {
      let result = text;
      const chineseMode = rules.enToZh.checked && !rules.zhToEn.checked;

      if (rules.trimLines.checked) {
        result = result.split("\n").map((line) => line.trim()).join("\n");
      }

      if (rules.enToZh.checked) {
        result = convertEnglishPunctuation(result);
      }

      if (rules.zhToEn.checked) {
        result = convertChinesePunctuation(result);
      }

      if (rules.spacesToComma.checked) {
        result = result.replace(/[ \t]+/g, chineseMode ? "，" : ",");
      }

      if (rules.colonSemicolon.checked) {
        result = result.replace(/[;；:：]+/g, chineseMode ? "，" : ",");
      }

      if (rules.ellipsisDash.checked) {
        result = normalizeEllipsisAndDash(result, chineseMode);
      }

      if (rules.collapse.checked) {
        result = collapsePunctuation(result, chineseMode);
      }

      if (chineseMode) {
        result = cleanCommaAroundChinesePunctuation(result);
      }

      if (rules.custom.checked) {
        const findText = document.getElementById("findText").value;
        const replaceText = document.getElementById("replaceText").value;
        if (findText) {
          result = result.split(findText).join(replaceText);
        }
      }

      return result;
    }

    function countDiffs(a, b) {
      const max = Math.max(a.length, b.length);
      let count = Math.abs(a.length - b.length);

      for (let i = 0; i < Math.min(a.length, b.length); i += 1) {
        if (a[i] !== b[i]) count += 1;
      }

      return max === 0 ? 0 : count;
    }

    function update() {
      const original = inputText.value;
      const cleaned = tidy(original);
      outputText.value = cleaned;
      charCount.textContent = original.length.toLocaleString("zh-CN");
      changeCount.textContent = countDiffs(original, cleaned).toLocaleString("zh-CN");
      lineCount.textContent = (original ? original.split("\n").length : 1).toLocaleString("zh-CN");
    }

    function setPreset(mode) {
      const zhMode = mode === "zh";
      rules.enToZh.checked = zhMode;
      rules.zhToEn.checked = !zhMode;
      rules.spacesToComma.checked = zhMode;
      rules.colonSemicolon.checked = true;
      rules.ellipsisDash.checked = true;
      rules.collapse.checked = true;
      rules.trimLines.checked = true;
      document.getElementById("zhPreset").classList.toggle("active", zhMode);
      document.getElementById("enPreset").classList.toggle("active", !zhMode);
      update();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function keepPunctuationDirectionExclusive(changedRule) {
      if (changedRule === rules.enToZh && rules.enToZh.checked) {
        rules.zhToEn.checked = false;
      }

      if (changedRule === rules.zhToEn && rules.zhToEn.checked) {
        rules.enToZh.checked = false;
      }
    }

    document.querySelectorAll("input[type='checkbox'], input[type='radio'], #findText, #replaceText").forEach((control) => {
      control.addEventListener("input", () => {
        keepPunctuationDirectionExclusive(control);
        update();
      });
      control.addEventListener("change", () => {
        keepPunctuationDirectionExclusive(control);
        update();
      });
    });

    inputText.addEventListener("input", update);
    document.getElementById("zhPreset").addEventListener("click", () => setPreset("zh"));
    document.getElementById("enPreset").addEventListener("click", () => setPreset("en"));

    document.getElementById("sampleBtn").addEventListener("click", () => {
      inputText.value = " 今天 天气很好; 但是,稿子里有英文标点: \"标点\", spaces 还有...多个!!!\n第二行: 中文；英文;混在一起 -- 需要整理。";
      update();
      inputText.focus();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      inputText.value = "";
      update();
      inputText.focus();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!outputText.value) return;
      try {
        await navigator.clipboard.writeText(outputText.value);
      } catch (error) {
        outputText.focus();
        outputText.select();
        document.execCommand("copy");
        window.getSelection().removeAllRanges();
      }
      showToast("已复制结果");
    });

    function crc32(bytes) {
      const table = (() => {
        const t = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let j = 0; j < 8; j += 1) {
            c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
          }
          t[i] = c;
        }
        return t;
      })();
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < bytes.length; i += 1) {
        crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xFF];
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    function createDocxBlob(text) {
      const enc = new TextEncoder();
      const escapeXml = (s) => s.replace(/[<>&"']/g, (c) => ({
        "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&apos;"
      }[c]));
      const paragraphs = text.split("\n").map((line) =>
        `<w:p><w:r><w:t xml:space="preserve">${escapeXml(line)}</w:t></w:r></w:p>`
      ).join("");
      const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paragraphs}</w:body>
</w:document>`;
      const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
      const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
      const entries = [
        { name: "[Content_Types].xml", data: enc.encode(contentTypesXml) },
        { name: "_rels/.rels", data: enc.encode(relsXml) },
        { name: "word/document.xml", data: enc.encode(documentXml) }
      ];
      const localParts = [];
      const centralParts = [];
      let offset = 0;
      for (const entry of entries) {
        const nameBytes = enc.encode(entry.name);
        const data = entry.data;
        const crc = crc32(data);
        const local = new Uint8Array(30 + nameBytes.length);
        const dv = new DataView(local.buffer);
        dv.setUint32(0, 0x04034b50, true);
        dv.setUint16(4, 20, true);
        dv.setUint16(6, 0, true);
        dv.setUint16(8, 0, true);
        dv.setUint16(10, 0, true);
        dv.setUint16(12, 0, true);
        dv.setUint32(14, crc, true);
        dv.setUint32(18, data.length, true);
        dv.setUint32(22, data.length, true);
        dv.setUint16(26, nameBytes.length, true);
        dv.setUint16(28, 0, true);
        local.set(nameBytes, 30);
        localParts.push(local, data);
        const central = new Uint8Array(46 + nameBytes.length);
        const cdv = new DataView(central.buffer);
        cdv.setUint32(0, 0x02014b50, true);
        cdv.setUint16(4, 20, true);
        cdv.setUint16(6, 20, true);
        cdv.setUint16(8, 0, true);
        cdv.setUint16(10, 0, true);
        cdv.setUint16(12, 0, true);
        cdv.setUint16(14, 0, true);
        cdv.setUint32(16, crc, true);
        cdv.setUint32(20, data.length, true);
        cdv.setUint32(24, data.length, true);
        cdv.setUint16(28, nameBytes.length, true);
        cdv.setUint16(30, 0, true);
        cdv.setUint16(32, 0, true);
        cdv.setUint16(34, 0, true);
        cdv.setUint16(36, 0, true);
        cdv.setUint32(38, 0, true);
        cdv.setUint32(42, offset, true);
        central.set(nameBytes, 46);
        centralParts.push(central);
        offset += local.length + data.length;
      }
      const eocd = new Uint8Array(22);
      const edv = new DataView(eocd.buffer);
      let centralSize = 0;
      for (const c of centralParts) centralSize += c.length;
      edv.setUint32(0, 0x06054b50, true);
      edv.setUint16(4, 0, true);
      edv.setUint16(6, 0, true);
      edv.setUint16(8, entries.length, true);
      edv.setUint16(10, entries.length, true);
      edv.setUint32(12, centralSize, true);
      edv.setUint32(16, offset, true);
      edv.setUint16(20, 0, true);
      return new Blob([...localParts, ...centralParts, eocd], {
        type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });
    }

    document.getElementById("downloadTxtBtn").addEventListener("click", () => {
      if (!outputText.value) return;
      const blob = new Blob([outputText.value], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "标点整理结果.txt";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已下载 TXT");
    });

    document.getElementById("downloadDocxBtn").addEventListener("click", () => {
      if (!outputText.value) return;
      const blob = createDocxBlob(outputText.value);
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "标点整理结果.docx";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已下载 Word");
    });

    update();
  </script>
</body>
</html>
