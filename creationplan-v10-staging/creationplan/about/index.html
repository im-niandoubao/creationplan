<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>100天造物计划 · 写在 Day 0 · 粘豆包</title>
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       关于计划 · 小红书 7 图文 + 自动浏览
       ============================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #5B7BF5;
      --primary-deep: #4456D4;
      --purple: #B79DFF;
      --pink: #FF8FA3;
      --yellow: #FFD66B;
      --text: #2D2B5F;
      --text-soft: #6B6B95;
      --text-mute: #9CA0BD;
      --card: #ffffff;
      --border: rgba(91, 123, 245, 0.12);
      --shadow-sm: 0 4px 12px rgba(91, 123, 245, 0.08);
      --shadow-md: 0 12px 32px rgba(91, 123, 245, 0.12);
      --shadow-lg: 0 20px 50px rgba(91, 123, 245, 0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: linear-gradient(135deg, #EAF1FF 0%, #F2EAFF 50%, #FFE5F0 100%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    a { color: inherit; text-decoration: none; }
    .display { font-family: 'ZCOOL KuaiLe', 'ZCOOL XiaoWei', cursive; letter-spacing: 0.02em; }

    /* ============================================
       顶部导航
       ============================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(91, 123, 245, 0.06);
    }

    .back-home {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 6px 11px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(91, 123, 245, 0.18);
      color: var(--text);
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .back-home:hover {
      background: white;
      transform: translateX(-2px);
      box-shadow: 0 6px 18px rgba(91, 123, 245, 0.28);
      color: var(--primary);
    }
    .back-home svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .topbar-title {
      flex: 1;
      text-align: center;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.15rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .topbar-title .accent {
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .autoplay-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
      color: white;
      border: none;
      border-radius: 999px;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(91, 123, 245, 0.35);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .autoplay-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(91, 123, 245, 0.5);
    }
    .autoplay-btn.is-playing {
      background: linear-gradient(135deg, var(--pink) 0%, #E66B85 100%);
      box-shadow: 0 4px 14px rgba(255, 143, 163, 0.4);
    }
    .autoplay-btn svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    /* ============================================
       引子区
       ============================================ */
    .intro {
      max-width: 600px;
      margin: 40px auto 24px;
      padding: 0 20px;
      text-align: center;
    }
    .intro-tag {
      display: inline-block;
      padding: 4px 14px;
      background: rgba(91, 123, 245, 0.1);
      color: var(--primary);
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.85rem;
      border-radius: 999px;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }
    .intro-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .intro-title .accent {
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .intro-sub {
      color: var(--text-soft);
      font-size: 0.95rem;
    }
    .intro-sub .heart {
      color: var(--pink);
      display: inline-block;
      animation: heart-beat 1.4s ease-in-out infinite;
    }
    @keyframes heart-beat {
      0%, 100% { transform: scale(1); }
      30%      { transform: scale(1.2); }
      60%      { transform: scale(0.95); }
    }

    /* ============================================
       7 张图竖排
       ============================================ */
    .card-stack {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .pic-card {
      position: relative;
      background: white;
      border-radius: 20px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      scroll-margin-top: 90px;
    }
    .pic-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .pic-card.is-active {
      box-shadow: 0 0 0 3px var(--primary), var(--shadow-lg);
    }

    .pic-num {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(6px);
      color: var(--primary);
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(91, 123, 245, 0.2);
    }
    .pic-num .total {
      color: var(--text-mute);
      font-size: 0.7rem;
      margin-left: 3px;
    }

    .pic-card img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ============================================
       底部 CTA
       ============================================ */
    .footer-cta {
      max-width: 540px;
      margin: 40px auto 0;
      padding: 0 20px;
      text-align: center;
    }
    .footer-cta-text {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 18px;
    }
    .footer-cta-text .accent {
      background: linear-gradient(135deg, var(--primary), var(--pink));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .footer-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
      color: white;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.05rem;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(91, 123, 245, 0.35);
      transition: all 0.2s;
    }
    .footer-cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(91, 123, 245, 0.5);
    }

    /* ============================================
       响应式
       ============================================ */
    @media (max-width: 600px) {
      .topbar { padding: 10px 14px; }
      .topbar-title { font-size: 1rem; }
      .back-home { padding: 4px 10px 4px 8px; font-size: 0.78rem; }
      .back-home svg { width: 14px; height: 14px; }
      .autoplay-btn { padding: 6px 12px; font-size: 0.8rem; }
      .autoplay-btn svg { width: 12px; height: 12px; }

      .intro { margin: 24px auto 16px; padding: 0 16px; }
      .intro-title { font-size: 1.3rem; }

      .card-stack { padding: 0 12px; }
      .pic-card { margin-bottom: 18px; border-radius: 16px; }
      .pic-num { min-width: 30px; height: 30px; font-size: 0.8rem; padding: 0 10px; }

      .footer-cta { margin-top: 28px; }
      .footer-cta-text { font-size: 1rem; }
      .footer-cta-btn { padding: 10px 22px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="topbar">
    <a href="/creationplan/" class="back-home" aria-label="返回造物计划">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>返回</span>
    </a>
    <h1 class="topbar-title">100天造物计划 · <span class="accent">写在 Day 0</span></h1>
    <button class="autoplay-btn" id="autoplayBtn" aria-label="自动浏览">
      <svg viewBox="0 0 24 24" id="autoplayIcon"><path d="M8 5v14l11-7z"/></svg>
      <span id="autoplayLabel">自动浏览</span>
    </button>
  </nav>

  <!-- 引子 -->
  <section class="intro">
    <span class="intro-tag">Day 0 · 写在开始之前</span>
    <h2 class="intro-title">先看清这 <span class="accent">7 张图</span><br>再看要不要上车</h2>
    <p class="intro-sub">这是计划的全部 <span class="heart">♥</span> 看完大概 1 分钟</p>
  </section>

  <!-- 7 张图 -->
  <main class="card-stack">
    <div class="pic-card" data-idx="0">
      <div class="pic-num">1<span class="total">/7</span></div>
      <img src="image1.png" alt="你的需求，一天实现" loading="lazy">
    </div>
    <div class="pic-card" data-idx="1">
      <div class="pic-num">2<span class="total">/7</span></div>
      <img src="image2.png" alt="你是不是也有过这样的想法" loading="lazy">
    </div>
    <div class="pic-card" data-idx="2">
      <div class="pic-num">3<span class="total">/7</span></div>
      <img src="image3.png" alt="免费帮 100 个粉丝实现需求" loading="lazy">
    </div>
    <div class="pic-card" data-idx="3">
      <div class="pic-num">4<span class="total">/7</span></div>
      <img src="image4.png" alt="特别适合" loading="lazy">
    </div>
    <div class="pic-card" data-idx="4">
      <div class="pic-num">5<span class="total">/7</span></div>
      <img src="image5.png" alt="流程示例 5" loading="lazy">
    </div>
    <div class="pic-card" data-idx="5">
      <div class="pic-num">6<span class="total">/7</span></div>
      <img src="image6.png" alt="流程示例 6" loading="lazy">
    </div>
    <div class="pic-card" data-idx="6">
      <div class="pic-num">7<span class="total">/7</span></div>
      <img src="image7.png" alt="你有什么需求 留在评论区吧" loading="lazy">
    </div>
  </main>

  <!-- 底部 CTA -->
  <section class="footer-cta">
    <p class="footer-cta-text">看完心动？<span class="accent">把想法变成现实</span></p>
    <a href="https://wcn80tpe0889.feishu.cn/share/base/form/shrcnUuxHWRV42AloeP03aulLHh"
       target="_blank" rel="noopener noreferrer" class="footer-cta-btn">
      提交我的需求
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </section>

  <script>
    // 自动浏览：每 4 秒 smooth scroll 到下一张
    (function() {
      const btn = document.getElementById('autoplayBtn');
      const label = document.getElementById('autoplayLabel');
      const icon = document.getElementById('autoplayIcon');
      const cards = Array.from(document.querySelectorAll('.pic-card'));
      const INTERVAL_MS = 4000;
      let timer = null;
      let idx = 0;
      const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
      const PAUSE_ICON = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';

      function highlight(n) {
        cards.forEach((c, i) => c.classList.toggle('is-active', i === n));
      }
      function scrollToIdx(n) {
        idx = n % cards.length;
        cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlight(idx);
      }
      function start() {
        if (timer) return;
        // 找到当前最接近视口中心的卡片
        const vh = window.innerHeight;
        let best = 0, bestDist = Infinity;
        cards.forEach((c, i) => {
          const r = c.getBoundingClientRect();
          const center = r.top + r.height / 2;
          const dist = Math.abs(center - vh / 2);
          if (dist < bestDist) { bestDist = dist; best = i; }
        });
        idx = best;
        highlight(idx);
        btn.classList.add('is-playing');
        label.textContent = '暂停';
        icon.innerHTML = PAUSE_ICON;
        timer = setInterval(() => scrollToIdx(idx + 1), INTERVAL_MS);
      }
      function stop() {
        if (!timer) return;
        clearInterval(timer);
        timer = null;
        btn.classList.remove('is-playing');
        label.textContent = '自动浏览';
        icon.innerHTML = PLAY_ICON;
        cards.forEach(c => c.classList.remove('is-active'));
      }
      btn.addEventListener('click', () => timer ? stop() : start());

      // 用户手动滚动时,自动停止播放
      let userScrolled = false;
      window.addEventListener('wheel', () => { if (timer) { userScrolled = true; stop(); } }, { passive: true });
      window.addEventListener('touchstart', () => { if (timer) { userScrolled = true; stop(); } }, { passive: true });
    })();
  </script>
</body>
</html>
